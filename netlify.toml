# Configuration Netlify — Phenix Rapports
#
# L'app est 100% statique (HTML + CSS + JS côté client).
# Le styles.css est déjà précompilé localement, donc rien à builder côté Netlify.
# Netlify va quand même exécuter `npm install` car package.json est présent —
# c'est inoffensif (tailwindcss s'installe en ~10s, n'est pas utilisé au runtime).

[build]
  # Pas de commande de build (styles.css est déjà compilé)
  command = "echo 'Static deploy, no build needed.'"
  # Le dossier racine du repo est publié tel quel
  publish = "."

# Optimisations Netlify désactivées (l'HTML inline contient déjà le JS)
[build.processing]
  skip_processing = true

# Headers MIME critiques (au cas où _headers ne suffit pas)
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"
