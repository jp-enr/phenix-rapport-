        // ===== RECHERCHE GLOBALE =====
        performSearch() {
          // Debounce 300ms
          if (this.searchTimer) clearTimeout(this.searchTimer);
          this.searchTimer = setTimeout(() => this.doSearch(), 300);
        },

        async doSearch() {
          const q = (this.searchQuery || "").trim();
          if (q.length < 2) {
            this.searchResults = [];
            return;
          }

          const results = [];

          // Chantiers (code ou nom)
          const { data: chantiers } = await supabaseClient
            .from("chantiers")
            .select("*")
            .or(`code.ilike.%${q}%,nom.ilike.%${q}%`)
            .eq("archive", false)
            .limit(5);
          
          for (const c of (chantiers || [])) {
            results.push({
              type: "chantier",
              typeLabel: "Chantier",
              icon: "🏗",
              id: c.id,
              title: `${c.code} — ${c.nom}`,
              subtitle: `${c.cp || ""} ${c.ville || ""} · ${c.statut}`,
              data: c,
            });
          }

          // Visites (numéro ou réf)
          const { data: visites } = await supabaseClient
            .from("visites")
            .select("*, chantiers(code, nom)")
            .or(`numero_vc.ilike.%${q}%,reference_visite.ilike.%${q}%`)
            .limit(5);
          
          for (const v of (visites || [])) {
            results.push({
              type: "visite",
              typeLabel: v.type_visite === "VI" ? "Note interne" : "Visite",
              icon: v.type_visite === "VI" ? "🔒" : "📋",
              id: v.id,
              title: `${v.numero_vc} — ${v.chantiers?.code || ""}`,
              subtitle: `${this.formatDateLong(v.date_visite)} · ${v.statut}`,
              data: v,
            });
          }

          // Réserves (numéro ou description)
          const { data: reserves } = await supabaseClient
            .from("reserves")
            .select("*, chantiers(code, nom)")
            .or(`numero.ilike.%${q}%,description_courte.ilike.%${q}%`)
            .limit(5);
          
          for (const r of (reserves || [])) {
            results.push({
              type: "reserve",
              typeLabel: "Réserve",
              icon: "📌",
              id: r.id,
              title: `${r.numero} — ${r.description_courte || ""}`.substring(0, 80),
              subtitle: `${r.chantiers?.code || ""} · ${r.statut}`,
              data: r,
            });
          }

          this.searchResults = results;
        },

        async openSearchResult(result) {
          this.searchQuery = "";
          this.searchResults = [];
          
          if (result.type === "chantier") {
            this.openChantier(result.data);
          } else if (result.type === "visite") {
            // Charger le chantier d'abord
            const { data: chantier } = await supabaseClient
              .from("chantiers")
              .select("*")
              .eq("id", result.data.chantier_id)
              .single();
            if (!chantier) return;
            this.selectedChantier = chantier;
            await this.loadChantierDetails();
            if (result.data.type_visite === "VI") {
              this.openVisiteInterne(result.data);
            } else {
              // openVisiteSmart va charger l'entreprise pour les VT
              this.openVisiteSmart(result.data);
            }
          } else if (result.type === "reserve") {
            this.goToReserve(result.data);
          }
        },

        async getNextNumeroVI() {
          if (!this.selectedChantier) return "VI-01";
          const { data } = await supabaseClient
            .from("visites")
            .select("numero_vc")
            .eq("chantier_id", this.selectedChantier.id)
            .eq("type_visite", "VI");
          if (!data || data.length === 0) return "VI-01";
          let maxNum = 0;
          for (const v of data) {
            const match = (v.numero_vc || "").match(/VI-?(\d+)/i);
            if (match) {
              const num = parseInt(match[1]);
              if (num > maxNum) maxNum = num;
            }
          }
          const next = maxNum + 1;
          return "VI-" + String(next).padStart(2, "0");
        },

        // ===== AJOUTER UN RAPPEL À UNE RÉSERVE =====
        async ajouterRappel(reserve) {
          const today = new Date().toISOString().split('T')[0];
          const currentVc = this.selectedVisite?.numero_vc || null;

          // Construire le nouvel historique
          const historique = Array.isArray(reserve.historique_rappels) 
            ? [...reserve.historique_rappels] 
            : [];
          historique.push({ date: today, vc: currentVc });

          const newCount = (reserve.nb_rappels || 0) + 1;

          this.confirmData = {
            title: `Ajouter un rappel`,
            message: `Confirmer l'envoi du rappel n°${newCount} pour la réserve ${reserve.numero} ?\n\nLa priorité sera automatiquement passée à "Haute".`,
            confirmLabel: `🔔 Envoyer rappel ${newCount}`,
            action: async () => {
              const { error } = await supabaseClient
                .from("reserves")
                .update({
                  nb_rappels: newCount,
                  historique_rappels: historique,
                  priorite: "Haute", // forcer Haute
                  derniere_vc: currentVc,
                })
                .eq("id", reserve.id);

              if (error) {
                this.showToast("Erreur : " + error.message, "error");
                return;
              }

              this.showToast(`Rappel ${newCount} ajouté ✓ (priorité → Haute)`, "success");
              await this.loadReservesVisite();
            },
          };
          this.modal = "confirm";
        },

        // ===== HELPERS VISUELS POUR LES RÉSERVES =====
        isRetard(reserve) {
          if (!reserve.echeance || reserve.statut !== "Ouverte") return false;
          const today = new Date().toISOString().split('T')[0];
          return reserve.echeance < today;
        },

        joursRetard(reserve) {
          if (!this.isRetard(reserve)) return 0;
          const echeance = new Date(reserve.echeance);
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          const diffMs = today - echeance;
          return Math.floor(diffMs / (1000 * 60 * 60 * 24));
        },

        getReserveBoxClass(r) {
          // Levée → grise
          if (r.statut === "Levée") {
            return "bg-gray-50 border-gray-300 opacity-80";
          }
          // 2+ rappels → rouge
          if (r.nb_rappels >= 2) {
            return "bg-red-50 border-red-400";
          }
          // 1 rappel ou en retard → orange
          if (r.nb_rappels === 1 || this.isRetard(r)) {
            return "bg-orange-50 border-orange-400";
          }
          // Reportée → bleu pâle
          if (r._reportee) {
            return "bg-phenix-blue-light/30 border-phenix-blue/40";
          }
          // Ouverte normale → vert
          return "bg-green-50/50 border-green-300";
        },

        getReserveStatusClass(r) {
          if (r.statut === "Levée") return "bg-gray-200 text-gray-600";
          if (r.nb_rappels >= 2) return "bg-red-100 text-red-800";
          if (r.nb_rappels === 1 || this.isRetard(r)) return "bg-orange-100 text-orange-800";
          return "bg-green-100 text-green-800";
        },

        // ===== PHOTOS - SÉLECTION + COMPRESSION =====
        // Gère 1 fichier (mode caméra) OU N fichiers (mode galerie multi-sélection)
        async onPhotoSelected(event) {
          const files = Array.from(event.target.files || []);
          if (files.length === 0) return;

          // Validation : que des images, taille max 20 Mo
          for (const f of files) {
            if (!f.type.startsWith('image/')) {
              this.showToast("Seules les images sont acceptées", "error");
              return;
            }
            if (f.size > 20 * 1024 * 1024) {
              this.showToast(`"${f.name}" trop volumineuse (max 20 Mo)`, "error");
              return;
            }
          }

          // Mode unitaire (1 seul fichier) → comportement historique
          if (files.length === 1) {
            const file = files[0];
            this.photoForm.batch = []; // s'assurer qu'on n'est pas en mode batch
            this.photoForm.originalSize = file.size;
            this.photoUploadProgress = "Compression en cours…";
            try {
              const compressed = await this.compressImage(file, 1600, 0.80);
              this.photoForm.fileBlob = compressed.blob;
              this.photoForm.preview = compressed.dataUrl;
              this.photoForm.compressedSize = compressed.blob.size;
              this.photoUploadProgress = null;
            } catch (err) {
              this.formError = "Erreur de compression : " + err.message;
              this.photoUploadProgress = null;
            }
            // Reset l'input pour permettre de reprendre la même photo si besoin
            event.target.value = "";
            return;
          }

          // Mode batch : compression de toutes les photos en parallèle
          this.photoForm.fileBlob = null;
          this.photoForm.preview = null;
          this.photoForm.batch = this.photoForm.batch || [];
          this.photoUploadProgress = `Compression de ${files.length} photo(s)…`;

          let done = 0;
          for (const file of files) {
            try {
              const compressed = await this.compressImage(file, 1600, 0.80);
              this.photoForm.batch.push({
                id: "b-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8),
                fileBlob: compressed.blob,
                preview: compressed.dataUrl,
                originalSize: file.size,
                compressedSize: compressed.blob.size,
              });
              done++;
              this.photoUploadProgress = `Compression ${done}/${files.length}…`;
            } catch (err) {
              console.warn("Erreur compression photo:", err);
            }
          }
          this.photoUploadProgress = null;
          event.target.value = "";
          if (this.photoForm.batch.length === 0) {
            this.formError = "Aucune photo n'a pu être préparée.";
          }
        },

        compressImage(file, maxWidth, quality) {
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
              const img = new Image();
              img.onload = () => {
                // Calculer dimensions cibles (préserver ratio)
                let width = img.width;
                let height = img.height;
                if (width > maxWidth) {
                  height = (maxWidth / width) * height;
                  width = maxWidth;
                }

                // Dessiner dans un canvas
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                // Exporter en JPEG compressé
                canvas.toBlob((blob) => {
                  if (!blob) {
                    reject(new Error("Échec de compression"));
                    return;
                  }
                  // dataUrl pour l'aperçu
                  const dataUrl = canvas.toDataURL('image/jpeg', quality);
                  resolve({ blob, dataUrl, width, height });
                }, 'image/jpeg', quality);
              };
              img.onerror = () => reject(new Error("Impossible de lire l'image"));
              img.src = e.target.result;
            };
            reader.onerror = () => reject(new Error("Lecture du fichier échouée"));
            reader.readAsDataURL(file);
          });
        },

        // ===== PHOTOS - SAUVEGARDE =====
        async savePhoto() {
          this.formError = "";

          // Construire la liste des photos à enregistrer : soit le batch, soit la photo unique
          const isBatch = (this.photoForm.batch && this.photoForm.batch.length > 0);
          const photosToSave = isBatch
            ? this.photoForm.batch.map(item => ({ fileBlob: item.fileBlob }))
            : (this.photoForm.fileBlob ? [{ fileBlob: this.photoForm.fileBlob }] : []);

          if (photosToSave.length === 0) {
            this.formError = "Veuillez choisir au moins une photo.";
            return;
          }

          // ===== Cas spécial : photo(s) de réserve avant que la réserve ne soit créée =====
          // Pas encore de reserve_id → on stocke en mémoire dans pendingReservePhotos.
          // L'upload se fera dans saveReserve() une fois qu'on aura un id.
          if (this.photoForm.attachee_a === "reserve" && !this.reserveForm.id) {
            photosToSave.forEach(p => {
              const previewUrl = URL.createObjectURL(p.fileBlob);
              this.pendingReservePhotos.push({
                id: "tmp-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8),
                fileBlob: p.fileBlob,
                previewUrl: previewUrl,
                legende: this.photoForm.legende || null,
                localisation: this.photoForm.localisation || null,
                date_prise_vue: this.photoForm.date_prise_vue || null,
              });
            });
            this.showToast(`${photosToSave.length} photo(s) ajoutée(s) — upload à la création de la réserve`, "success");
            // Rester sur la modale réserve
            this.modal = "reserve";
            this.formError = "";
            this.formLoading = false;
            this.photoForm = {
              attachee_a: "reserve",
              legende: "",
              localisation: "",
              date_prise_vue: "",
              fileBlob: null,
              preview: null,
              originalSize: 0,
              compressedSize: 0,
              batch: [],
            };
            this.photoUploadProgress = null;
            return;
          }

          this.formLoading = true;
          let uploaded = 0;
          let failed = 0;
          const total = photosToSave.length;

          // Boucle d'upload séquentielle (plus stable sur 4G faible que parallèle)
          for (let i = 0; i < photosToSave.length; i++) {
            this.photoUploadProgress = total === 1
              ? "Upload sur Supabase…"
              : `Upload ${i + 1}/${total}…`;
            const ok = await this._uploadOnePhoto(photosToSave[i].fileBlob);
            if (ok) uploaded++; else failed++;
          }

          try {
            // Bloc try/catch préservé pour structure existante (les erreurs sont gérées dans _uploadOnePhoto)
            if (uploaded > 0) {
              this.showToast(
                failed === 0
                  ? (total === 1 ? "Photo ajoutée ✓" : `${uploaded} photo(s) ajoutée(s) ✓`)
                  : `${uploaded} photo(s) OK, ${failed} échec(s)`,
                failed === 0 ? "success" : "warning"
              );
            } else {
              this.formError = "Échec de l'upload. Vérifiez votre connexion.";
              this.formLoading = false;
              this.photoUploadProgress = null;
              return;
            }
            this.photoUploadProgress = null;

            // Mémoriser le type avant le reset (pour le rechargement ci-dessous)
            const attacheeA = this.photoForm.attachee_a;

            // Si la photo est liée à une réserve EXISTANTE : on reste sur la modale réserve
            if (attacheeA === "reserve" && this.reserveForm.id) {
              this.modal = "reserve";
              this.formError = "";
              this.formLoading = false;
              this.photoForm = {
                attachee_a: "reserve",
                legende: "",
                localisation: "",
                date_prise_vue: "",
                fileBlob: null,
                preview: null,
                originalSize: 0,
                compressedSize: 0,
                batch: [],
              };
            } else {
              this.closeModal();
            }

            // Recharger selon le contexte
            if (attacheeA === "visite") {
              await this.loadPhotosVisite();
            } else if (attacheeA === "chantier") {
              await this.loadPhotosChantier();
            } else if (attacheeA === "reserve" && this.reserveForm.id) {
              await this.loadPhotosReserve(this.reserveForm.id);
            }
            this.formLoading = false;
            return;
          } catch (err) {
            this.formError = "Erreur : " + (err.message || err);
            this.photoUploadProgress = null;
            this.formLoading = false;
            return;
          }

        },

        // ===== HELPER : upload d'UNE photo (fileBlob) vers Supabase + insertion en base =====
        // Utilise les valeurs courantes de photoForm pour légende/localisation/date.
        // Retourne true si ok, false sinon.
        async _uploadOnePhoto(fileBlob) {
          try {
            const uuid = crypto.randomUUID();
            const chantierCode = this.selectedChantier?.code || "general";
            const subfolder = this.photoForm.attachee_a === "chantier"
              ? "chantier"
              : (this.selectedVisite?.id || "no-visite");
            const filename = `${chantierCode}/${subfolder}/${uuid}.jpg`;

            const { error: uploadError } = await supabaseClient.storage
              .from('rapports Photos')
              .upload(filename, fileBlob, { contentType: 'image/jpeg', upsert: false });
            if (uploadError) throw uploadError;

            const { data: urlData } = supabaseClient.storage
              .from('rapports Photos')
              .getPublicUrl(filename);

            const photoPayload = {
              chantier_id: this.selectedChantier?.id || null,
              visite_id: this.photoForm.attachee_a === "chantier" ? null : (this.selectedVisite?.id || null),
              reserve_id: this.photoForm.attachee_a === "reserve" ? this.reserveForm.id : null,
              attachee_a: this.photoForm.attachee_a,
              reference_visite: this.selectedVisite?.reference_visite || null,
              legende: this.photoForm.legende || null,
              localisation: this.photoForm.localisation || null,
              date_prise_vue: this.photoForm.date_prise_vue || null,
              url_storage: urlData.publicUrl,
              ordre_affichage: 0,
            };

            const { error: dbError } = await supabaseClient.from('photos').insert(photoPayload);
            if (dbError) throw dbError;
            return true;
          } catch (err) {
            console.error("Upload photo échoué:", err);
            return false;
          }
        },

        // ===== HELPER : upload d'UNE photo en attente vers Supabase =====
        // Utilisé après création d'une réserve pour dépiler pendingReservePhotos.
        // Retourne true si ok, false si erreur (en cas d'erreur on log mais on n'interrompt pas).
        async _uploadPendingReservePhoto(pendingPhoto, reserveId) {
          try {
            const uuid = crypto.randomUUID();
            const chantierCode = this.selectedChantier?.code || "general";
            const subfolder = this.selectedVisite?.id || "no-visite";
            const filename = `${chantierCode}/${subfolder}/${uuid}.jpg`;

            // Upload Storage
            const { error: uploadError } = await supabaseClient.storage
              .from('rapports Photos')
              .upload(filename, pendingPhoto.fileBlob, {
                contentType: 'image/jpeg',
                upsert: false,
              });
            if (uploadError) throw uploadError;

            // URL publique
            const { data: urlData } = supabaseClient.storage
              .from('rapports Photos')
              .getPublicUrl(filename);

            // Insertion en base
            const photoPayload = {
              chantier_id: this.selectedChantier?.id || null,
              visite_id: this.selectedVisite?.id || null,
              reserve_id: reserveId,
              attachee_a: "reserve",
              reference_visite: this.selectedVisite?.reference_visite || null,
              legende: pendingPhoto.legende,
              localisation: pendingPhoto.localisation,
              date_prise_vue: pendingPhoto.date_prise_vue,
              url_storage: urlData.publicUrl,
              ordre_affichage: 0,
            };
            const { error: dbError } = await supabaseClient
              .from('photos')
              .insert(photoPayload);
            if (dbError) throw dbError;

            return true;
          } catch (err) {
            console.warn("Erreur upload photo en attente:", err);
            return false;
          }
        },

        // Supprimer une photo encore en attente (pas encore uploadée)
        // Distinct de supprimerPhoto() qui supprime une photo déjà en BDD.
        removePendingReservePhoto(tempId) {
          const idx = this.pendingReservePhotos.findIndex(p => p.id === tempId);
          if (idx === -1) return;
          // Libérer l'URL blob pour éviter les fuites mémoire
          try { URL.revokeObjectURL(this.pendingReservePhotos[idx].previewUrl); } catch(e){}
          this.pendingReservePhotos.splice(idx, 1);
        },

        // Vider et nettoyer le buffer (à l'annulation ou la fermeture)
        clearPendingReservePhotos() {
          for (const p of this.pendingReservePhotos) {
            try { URL.revokeObjectURL(p.previewUrl); } catch(e){}
          }
          this.pendingReservePhotos = [];
        },

        // ===== PHOTOS - SUPPRESSION =====
        async supprimerPhoto(photo) {
          if (!photo) return;

          this.confirmData = {
            title: "Supprimer la photo",
            message: `Confirmer la suppression de cette photo ? L'action est irréversible.`,
            confirmLabel: "Supprimer",
            action: async () => {
              try {
                // Extraire le path Storage de l'URL publique
                const url = photo.url_storage;
                const pathMatch = url.match(/rapports Photos\/(.+)$/);
                const storagePath = pathMatch ? pathMatch[1] : null;

                // Supprimer en base photos
                const { error: dbError } = await supabaseClient
                  .from('photos')
                  .delete()
                  .eq('id', photo.id);

                if (dbError) throw dbError;

                // Supprimer le fichier Storage (best-effort, on continue même si ça échoue)
                if (storagePath) {
                  await supabaseClient.storage
                    .from('rapports Photos')
                    .remove([storagePath]);
                }

                this.showToast("Photo supprimée ✓", "success");
                
                // Fermer la lightbox si elle était ouverte
                this.closeLightbox();

                // Recharger la liste appropriée
                if (photo.attachee_a === "visite") {
                  await this.loadPhotosVisite();
                } else if (photo.attachee_a === "chantier") {
                  await this.loadPhotosChantier();
                } else if (photo.attachee_a === "reserve" && photo.reserve_id) {
                  await this.loadPhotosReserve(photo.reserve_id);
                }
              } catch (err) {
                this.showToast("Erreur : " + (err.message || err), "error");
              }
            },
          };
          this.modal = "confirm";
        },

        // ===== LIGHTBOX =====
        openLightbox(photos, index) {
          this.lightbox = { photos: photos, index: index };
        },

        closeLightbox() {
          this.lightbox = null;
        },

        prevLightboxPhoto() {
          if (this.lightbox && this.lightbox.index > 0) {
            this.lightbox.index--;
