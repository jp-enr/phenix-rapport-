        },

        nextLightboxPhoto() {
          if (this.lightbox && this.lightbox.index < this.lightbox.photos.length - 1) {
            this.lightbox.index++;
          }
        },

        // ===== HELPER : formater taille de fichier =====
        formatFileSize(bytes) {
          if (!bytes) return "0 KB";
          if (bytes < 1024) return bytes + " B";
          if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
          return (bytes / (1024 * 1024)).toFixed(2) + " MB";
        },

        // ===== HELPERS =====
        formatDate(dateStr) {
          if (!dateStr) return "";
          const d = new Date(dateStr);
          return d.toLocaleDateString("fr-FR");
        },

        formatDateLong(dateStr) {
          if (!dateStr) return "";
          const d = new Date(dateStr);
          return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "long", year: "numeric" });
        },

        formatDateFull(dateStr) {
          if (!dateStr) return "";
          const d = new Date(dateStr);
          return d.toLocaleDateString("fr-FR", { weekday: "long", day: "2-digit", month: "long", year: "numeric" });
        },

        // 3e param duree facultatif : permet d'allonger l'affichage pour les messages
        // pédagogiques importants (ex : "glissez le PDF dans Outlook" qui demande de la lecture).
        showToast(message, type = "info", duree = 3000) {
          this.toast = { message, type };
          // Annuler un éventuel timer précédent pour ne pas couper le nouveau toast
          if (this._toastTimer) clearTimeout(this._toastTimer);
          this._toastTimer = setTimeout(() => { this.toast = null; this._toastTimer = null; }, duree);
        },

        // ===== MODALE DESTINATAIRES PDF =====
        // Mode 'download' (défaut) : télécharge juste le PDF
        // Mode 'email' : télécharge le PDF + ouvre mailto: pour envoyer aux destinataires sélectionnés
        async openPdfDestModal(mode = "download") {
          if (!this.selectedVisite || !this.selectedChantier) return;
          this.pdfMode = mode;
          
          // Construire la liste des destinataires possibles (présents + destinataires + intervenants chantier)
          const list = [];
          const seenIds = new Set();
          const presentIds = new Set((this.selectedVisite.presents_ids || []).map(p => p.id));

          // 1) Destinataires déjà sélectionnés (cochés par défaut)
          for (const d of (this.selectedVisite.destinataires_ids || [])) {
            if (seenIds.has(d.id)) continue;
            seenIds.add(d.id);
            list.push({
              ...d,
              _selected: true,
              _present: presentIds.has(d.id),
              _isExtra: false,
            });
          }

          // 2) Présents qui ne sont pas encore destinataires (cochés par défaut)
          for (const p of (this.selectedVisite.presents_ids || [])) {
            if (seenIds.has(p.id)) continue;
            seenIds.add(p.id);
            list.push({
              ...p,
              _selected: true,
              _present: true,
              _isExtra: false,
            });
          }

          // 3) Autres intervenants du chantier (décochés par défaut)
          if (this.chantierIntervenants.length === 0) {
            await this.loadChantierIntervenants();
          }
          for (const i of this.chantierIntervenants) {
            if (seenIds.has(i.id)) continue;
            seenIds.add(i.id);
            list.push({
              id: i.id,
              nom: i.nom_complet,
              societe: i.societe || "",
              fonction: i.fonction || "",
              type: i.type || "",
              email: i.email || "",
              membre_phenix_solar: i.membre_phenix_solar,
              _selected: false,
              _present: presentIds.has(i.id),
              _isExtra: false,
            });
          }

          // 4) Emails libres (depuis le champ texte)
          if (this.selectedVisite.destinataires) {
            const emails = this.selectedVisite.destinataires.split(/[,;\n]/).map(e => e.trim()).filter(Boolean);
            for (const email of emails) {
              if ([...seenIds].some(id => list.find(l => l.id === id && l.email === email))) continue;
              const fakeId = "extra-" + email;
              if (seenIds.has(fakeId)) continue;
              seenIds.add(fakeId);
              list.push({
                id: fakeId,
                nom: email,
                societe: "",
                fonction: "",
                type: "",
                email,
                _selected: true,
                _present: false,
                _isExtra: true,
              });
            }
          }

          this.pdfDestList = list;
          this.pdfDestExtraEmail = "";
          this.modal = "pdf-destinataires";
        },

        pdfDestSelectAll() {
          this.pdfDestList.forEach(d => d._selected = true);
        },

        pdfDestUnselectAll() {
          this.pdfDestList.forEach(d => d._selected = false);
        },

        pdfDestSelectPresentsOnly() {
          this.pdfDestList.forEach(d => d._selected = !!d._present);
        },

        pdfDestAddExtra() {
          const email = (this.pdfDestExtraEmail || "").trim();
          if (!email) return;
          // Vérifier qu'il n'existe pas déjà
          if (this.pdfDestList.some(d => d.email === email)) {
            this.showToast("Cet email est déjà dans la liste", "info");
            return;
          }
          const fakeId = "extra-" + email;
          this.pdfDestList.push({
            id: fakeId,
            nom: email,
            societe: "",
            fonction: "",
            type: "",
            email,
            _selected: true,
            _present: false,
            _isExtra: true,
          });
          this.pdfDestExtraEmail = "";
          this.showToast("Destinataire ajouté ✓", "success");
        },

        async confirmPdfExport() {
          // Récupérer la liste finale des destinataires sélectionnés
          this._pdfFinalDestinataires = this.pdfDestList.filter(d => d._selected);
          const mode = this.pdfMode || "download";
          this.closeModal();

          // Mode 'outlook-graph' : tout est piloté par envoyerViaOutlookGraph (PDF en mémoire,
          // login MSAL, brouillon avec PJ). PAS d'appel à generatePDF() qui télécharge en local.
          if (mode === "outlook-graph") {
            await this.envoyerViaOutlookGraph();
            return;
          }

          // Modes 'download' et 'email' : génération PDF classique avec téléchargement local
          this.formLoading = true;
          setTimeout(async () => {
            await this.generatePDF();
            this.formLoading = false;
            if (mode === "email") {
              this._ouvrirEmail();
            }
          }, 100);
        },

        // Ouvre le client mail système (mailto:) avec destinataires + objet + corps pré-remplis.
        // LIMITATION : impossible d'attacher le PDF automatiquement (sécurité navigateur).
        // Le PDF a été téléchargé localement par generatePDF() ; l'utilisateur doit le glisser-déposer
        // dans la fenêtre mail.
        // Pour l'envoi avec PJ automatique, voir envoyerViaOutlookGraph() qui utilise Microsoft Graph.
        _ouvrirEmail() {
          if (!this.selectedVisite || !this.selectedChantier) return;
          const dests = this._pdfFinalDestinataires || [];
          const emails = dests.map(d => d.email).filter(Boolean);
          if (emails.length === 0) {
            this.showToast("Aucun destinataire avec email — impossible de pré-remplir le mail", "error");
            return;
          }

          const { objet, corps } = this._construireMailContenu();
          const url = "mailto:" + encodeURIComponent(emails.join(",")) +
            "?subject=" + encodeURIComponent(objet) +
            "&body=" + encodeURIComponent(corps);
          window.location.href = url;
          this.showToast("📧 Client mail ouvert. Glissez le PDF téléchargé dans la fenêtre Outlook avant d'envoyer.", "success", 8000);
        },

        // Helper : construit l'objet + corps du mail (utilisé par mailto: ET Microsoft Graph)
        _construireMailContenu() {
          const dateFr = this.formatDate(this.selectedVisite.date_visite);
          const typeLabel = this.selectedVisite.type_visite === "VT" ? "visite technique" : "visite de chantier";
          const numero = this.selectedVisite.numero_vc || "";
          const codeChantier = this.selectedChantier.code || "";
          const nomChantier = this.selectedChantier.nom || "";
          const objet = `[Phenix Solar] Rapport ${numero} — ${codeChantier} ${nomChantier} — ${dateFr}`;
          const redacteur = this.selectedVisite.redacteur || "";
          const signature = redacteur ? `\n\nCordialement,\n${redacteur}\nPhenix Solar` : "\n\nCordialement,\nPhenix Solar";
          const corps = `Bonjour,\n\nVeuillez trouver ci-joint le rapport de ${typeLabel} ${numero} en date du ${dateFr} pour le site ${codeChantier} — ${nomChantier}.\n\nMerci de me faire remonter vos remarques si nécessaire.${signature}`;
          return { objet, corps };
        },

        // Construit le nom du fichier PDF au format demandé :
        // "CS2-8404-Bleu Vert - Rapport VC02 05.05.2026.pdf"
        _construireNomFichierPdf() {
          const code = this.selectedChantier.code || "chantier";
          const nom = (this.selectedChantier.nom || "").trim();
          const numero = this.selectedVisite.numero_vc || "";
          // Date au format JJ.MM.AAAA (avec points comme demandé)
          const d = this.selectedVisite.date_visite || "";
          let datePoints = "";
          if (d) {
            // d est en YYYY-MM-DD → on convertit en JJ.MM.AAAA
            const parts = d.split("-");
            if (parts.length === 3) datePoints = `${parts[2]}.${parts[1]}.${parts[0]}`;
          }
          // On garde des caractères safe (pas de / \ : * ? " < > | qui posent problème en pièce jointe)
          let filename = `${code}-${nom} - Rapport ${numero} ${datePoints}.pdf`;
          // Nettoyage défensif : remplacer les caractères interdits par "-"
          filename = filename.replace(/[\/\\:*?"<>|]/g, "-");
          return filename;
        },

        // ===== MICROSOFT GRAPH (intégration Outlook avec PJ) =====
        // État de l'authentification MSAL — initialisée à la 1ère utilisation
        _msalInstance: null,
        _msalAccount: null,

        // Initialise MSAL à la demande (lazy loading pour ne pas charger pour rien)
        async _initMsal() {
          if (this._msalInstance) return this._msalInstance;
          if (typeof msal === "undefined") {
            throw new Error("MSAL.js non chargé — vérifiez votre connexion internet");
          }
          this._msalInstance = new msal.PublicClientApplication(window.MSAL_CONFIG);
          await this._msalInstance.initialize();
          // Tenter de récupérer un compte déjà connecté (cache session)
          const accounts = this._msalInstance.getAllAccounts();
          if (accounts.length > 0) {
            this._msalAccount = accounts[0];
          }
          return this._msalInstance;
        },

        // Récupère un access token Microsoft Graph (silencieux si possible, popup sinon)
        async _getGraphToken() {
          await this._initMsal();
          // Tentative silencieuse en premier (ne déclenche pas de popup si le token est en cache)
          if (this._msalAccount) {
            try {
              const result = await this._msalInstance.acquireTokenSilent({
                scopes: window.MSAL_SCOPES,
                account: this._msalAccount,
              });
              return result.accessToken;
            } catch (silentErr) {
              console.warn("Token silencieux échoué, fallback popup:", silentErr.message);
            }
          }
          // Fallback : popup de connexion
          const result = await this._msalInstance.loginPopup({ scopes: window.MSAL_SCOPES });
          this._msalAccount = result.account;
          return result.accessToken;
        },

        // Lance la déconnexion Microsoft (utile en debug)
        async deconnecterMicrosoft() {
          if (!this._msalInstance) return;
          await this._msalInstance.logoutPopup();
          this._msalAccount = null;
          this.showToast("Déconnecté de Microsoft 365", "info");
        },

        // ===== ENVOI VIA MICROSOFT GRAPH =====
        // Crée un brouillon Outlook avec destinataires + corps + PDF en pièce jointe.
        // Pas d'envoi automatique : l'utilisateur valide le mail dans Outlook avant d'envoyer.
        // Flow :
        //   1. Sélection des destinataires (modale standard, mode "outlook-graph")
        //   2. Génération du PDF en mémoire (jsPDF.output('blob'))
        //   3. Login MSAL si pas déjà fait
        //   4. POST /me/messages → crée un brouillon vide
        //   5. POST /me/messages/{id}/attachments → attache le PDF
        //   6. Ouvre Outlook desktop sur le brouillon via webLink
        async envoyerViaOutlookGraph() {
          if (!this.selectedVisite || !this.selectedChantier) return;
          const dests = this._pdfFinalDestinataires || [];
          const emails = dests.map(d => d.email).filter(Boolean);
          if (emails.length === 0) {
            this.showToast("Aucun destinataire avec email", "error");
            return;
          }

          this.formLoading = true;
          this.outlookGraphProgress = "Connexion à Microsoft 365…";

          try {
            // 1. Token Microsoft Graph (déclenche login popup si pas connecté)
            const token = await this._getGraphToken();

            // 2. Génération du PDF en mémoire (sans téléchargement local)
            this.outlookGraphProgress = "Génération du PDF…";
            const pdfBlob = await this._genererPdfPourGraph();
            // Convertir en base64 (Graph attend du base64 pour les attachments)
            const pdfBase64 = await this._blobToBase64(pdfBlob);

            // 3. Construction du payload mail
            const { objet, corps } = this._construireMailContenu();
            const filename = this._construireNomFichierPdf();
            const toRecipients = emails.map(email => ({ emailAddress: { address: email } }));

            // 4. Créer le brouillon
            this.outlookGraphProgress = "Création du brouillon Outlook…";
            const draftResp = await fetch("https://graph.microsoft.com/v1.0/me/messages", {
              method: "POST",
              headers: {
                "Authorization": "Bearer " + token,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                subject: objet,
                body: { contentType: "Text", content: corps },
                toRecipients: toRecipients,
              }),
            });
            if (!draftResp.ok) {
              const err = await draftResp.text();
              throw new Error("Échec création brouillon : " + err);
            }
            const draft = await draftResp.json();
            const draftId = draft.id;
            const webLink = draft.webLink; // URL pour rouvrir le brouillon dans Outlook

            // 5. Attacher le PDF au brouillon
            // ⚠ Microsoft Graph limite la méthode POST simple aux fichiers < 3 Mo.
            // Au-dessus, il faut créer une "upload session" et envoyer par morceaux.
            // Limite documentée : https://learn.microsoft.com/en-us/graph/outlook-large-attachments
            const PDF_SIZE_LIMIT = 3 * 1024 * 1024; // 3 Mo
            this.outlookGraphProgress = "Attachement du PDF…";

            if (pdfBlob.size <= PDF_SIZE_LIMIT) {
              // === Cas 1 : PDF petit (< 3 Mo) → POST direct avec base64 ===
              const attachResp = await fetch(`https://graph.microsoft.com/v1.0/me/messages/${draftId}/attachments`, {
                method: "POST",
                headers: {
                  "Authorization": "Bearer " + token,
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  "@odata.type": "#microsoft.graph.fileAttachment",
                  name: filename,
                  contentType: "application/pdf",
                  contentBytes: pdfBase64,
                }),
              });
              if (!attachResp.ok) {
                const err = await attachResp.text();
                throw new Error("Échec attachement PDF (méthode directe) : " + err);
              }
            } else {
              // === Cas 2 : PDF gros (≥ 3 Mo) → upload session + chunks ===
              // 5a. Créer la session d'upload
              const sessionResp = await fetch(
                `https://graph.microsoft.com/v1.0/me/messages/${draftId}/attachments/createUploadSession`,
                {
                  method: "POST",
                  headers: {
                    "Authorization": "Bearer " + token,
                    "Content-Type": "application/json",
                  },
                  body: JSON.stringify({
                    AttachmentItem: {
                      attachmentType: "file",
                      name: filename,
                      size: pdfBlob.size,
                      contentType: "application/pdf",
                    },
                  }),
                }
              );
              if (!sessionResp.ok) {
                const err = await sessionResp.text();
                throw new Error("Échec création session d'upload : " + err);
              }
              const sessionData = await sessionResp.json();
              const uploadUrl = sessionData.uploadUrl;
              if (!uploadUrl) throw new Error("URL d'upload manquante dans la réponse Graph");

              // 5b. Upload par morceaux (chunks multiples de 320 KiB, ici ~3,1 Mo par chunk)
              // Note : l'URL d'upload est pré-authentifiée, pas besoin du Bearer token sur les PUT
              const CHUNK_SIZE = 320 * 1024 * 10; // 3 276 800 octets = 3,125 Mo
              const buffer = await pdfBlob.arrayBuffer();
              const totalSize = buffer.byteLength;
              let offset = 0;
              while (offset < totalSize) {
                const end = Math.min(offset + CHUNK_SIZE, totalSize);
                const chunk = buffer.slice(offset, end);
                const range = `bytes ${offset}-${end - 1}/${totalSize}`;
                const pct = Math.round((end / totalSize) * 100);
                this.outlookGraphProgress = `Upload PDF ${pct}%…`;

                const chunkResp = await fetch(uploadUrl, {
                  method: "PUT",
                  headers: {
                    "Content-Range": range,
                    // Pas de Content-Type ni Authorization : Graph attend du binaire brut sur URL pré-signée
                  },
                  body: chunk,
                });
                // Graph répond 202 pour les chunks intermédiaires, 201/200 pour le dernier
                if (chunkResp.status !== 200 && chunkResp.status !== 201 && chunkResp.status !== 202) {
                  const err = await chunkResp.text();
                  throw new Error(`Échec upload chunk (${range}) : HTTP ${chunkResp.status} — ${err}`);
                }
                offset = end;
              }
            }

            // 6. Ouvrir le brouillon dans Outlook (desktop si installé, sinon Outlook Web)
            // La webLink Microsoft ouvre l'app desktop si elle est associée au protocole, sinon le navigateur
            this.outlookGraphProgress = null;
            this.formLoading = false;
            window.open(webLink, "_blank");
            this.showToast("✅ Brouillon créé dans Outlook avec le PDF attaché. Vérifiez et envoyez.", "success", 8000);
          } catch (err) {
            this.outlookGraphProgress = null;
            this.formLoading = false;
            console.error("Erreur Outlook Graph:", err);
            // Message utilisateur clair selon le type d'erreur
            if (err.errorCode === "user_cancelled" || err.message?.includes("user_cancelled")) {
              this.showToast("Connexion Microsoft annulée", "info");
            } else {
              this.showToast("Erreur Outlook : " + (err.message || err), "error", 6000);
            }
          }
        },

        // Génère le PDF en mémoire (au lieu de le sauvegarder) pour pouvoir l'envoyer à Graph.
        // Réutilise toute la logique de generatePDF() mais retourne un Blob au lieu de download().
        async _genererPdfPourGraph() {
          // Astuce : on intercepte temporairement le doc.save() de jsPDF pour qu'il retourne le blob
          // au lieu de déclencher le téléchargement. C'est plus propre que de dupliquer 700 lignes de PDF.
          const originalSave = window._jspdfSavePatched;
          let captured = null;
          // Patch monkey : on remplace la méthode save de jsPDF avant d'appeler generatePDF
          if (!window.jspdf || !window.jspdf.jsPDF) throw new Error("jsPDF non chargé");
          const PDFProto = window.jspdf.jsPDF.API;
          const originalSaveMethod = PDFProto.save;
          PDFProto.save = function(filename) {
            // Capture le blob au lieu de le sauver
            captured = this.output("blob");
            return this;
          };
          try {
            await this.generatePDF();
          } finally {
            // Restaurer save dans tous les cas
            PDFProto.save = originalSaveMethod;
          }
          if (!captured) throw new Error("Génération PDF échouée");
          return captured;
        },

        // Convertit un Blob en chaîne base64 (sans préfixe data:...;base64,)
        async _blobToBase64(blob) {
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => {
              const result = reader.result; // "data:application/pdf;base64,XXXX"
              const base64 = result.split(",")[1];
              resolve(base64);
            };
            reader.onerror = () => reject(new Error("Lecture du blob échouée"));
            reader.readAsDataURL(blob);
          });
        },

        // État pour l'UI : message de progression Outlook Graph
        outlookGraphProgress: null,

        // ===== THÈME PDF (centralisation des couleurs et tailles) =====
        // Permet de garder le rendu cohérent et d'éviter de répéter [13, 68, 132] partout.
        // Les couleurs sont en RGB (ce qu'attend jsPDF). Pour ajouter un type, dupliquer un bloc.
        getPdfTheme(typeVisite) {
          const themes = {
            VC: {
              primary:   [13, 68, 132],    // Bleu Phenix — bandeau header, sections, tableaux
              accent:    [242, 172, 16],   // Jaune Phenix — bande gauche des sections, ligne décorative
              labelBg:   [233, 240, 250],  // Bleu très clair — fond colonne label des tableaux
              labelText: [13, 68, 132],
              titleText: [13, 68, 132],
              accentBox: [242, 172, 16],
            },
            VT: {
              primary:   [234, 88, 12],    // orange-600 — bandeau header, sections, tableaux
              accent:    [154, 52, 18],    // orange-900 — bande gauche, ligne décorative
              labelBg:   [255, 237, 213],  // orange-100 — fond colonne label
              labelText: [124, 45, 18],    // orange-950
              titleText: [194, 65, 12],    // orange-700
              accentBox: [251, 146, 60],   // orange-400 — bordure encadré entreprise
              boxBg:     [255, 247, 237],  // orange-50  — fond encadré entreprise
              boxText:   [124, 45, 18],
            }
          };
          return themes[typeVisite] || themes.VC;
        },

        // ===== GÉNÉRATION PDF =====
        async generatePDF() {
          if (!this.selectedVisite || !this.selectedChantier) return;

          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ unit: "mm", format: "a4" });

          const pageWidth = doc.internal.pageSize.getWidth();
          const pageHeight = doc.internal.pageSize.getHeight();
          const marginX = 14;
          let y = 20;

          // Construire la liste des destinataires sélectionnés (depuis la modale)
          const destinataires = this._pdfFinalDestinataires || [];
          const destinatairesText = destinataires.length > 0
            ? destinataires.map(d => d.email || d.nom).filter(Boolean).join(", ")
            : "—";

          // Récupérer les IDs des présents pour la colonne P du tableau
          const presentsIds = new Set((this.selectedVisite.presents_ids || []).map(p => p.id));
          // Récupérer les IDs des destinataires (pour la colonne D du tableau intervenants)
          // — depuis liens_chantier_intervenant.diffusion_d
          const diffusionIds = new Set((this.liens || [])
            .filter(l => l.diffusion_d)
            .map(l => l.intervenants?.id)
            .filter(Boolean));

          // Type de visite + thème centralisé
          const isVT = this.selectedVisite.type_visite === "VT";
          const T = this.getPdfTheme(isVT ? "VT" : "VC");

          // ===== HEADER MODERNE =====
          // Bandeau couleur primaire du thème (22mm de haut)
          doc.setFillColor(...T.primary);
          doc.rect(0, 0, pageWidth, 22, "F");

          // Logo Phenix Solar (si présent) — toujours dans un cartouche blanc à gauche
          if (window.PHENIX_LOGO_BASE64) {
            try {
              doc.setFillColor(255, 255, 255);
              doc.roundedRect(marginX - 1, 3, 27, 16, 1.5, 1.5, "F");
              doc.addImage(window.PHENIX_LOGO_BASE64, 'PNG', marginX, 4.5, 24, 13);
            } catch (e) {
              // Fallback "PS" stylisé
              doc.setFillColor(...T.accent);
              doc.rect(marginX, 6, 10, 10, "F");
              doc.setTextColor(...T.primary);
              doc.setFontSize(14);
              doc.setFont("helvetica", "bold");
              doc.text("PS", marginX + 5, 13, { align: "center" });
            }
          } else {
            doc.setFillColor(...T.accent);
            doc.rect(marginX, 6, 10, 10, "F");
            doc.setTextColor(...T.primary);
            doc.setFontSize(14);
            doc.setFont("helvetica", "bold");
            doc.text("PS", marginX + 5, 13, { align: "center" });
          }

          // Titre PRINCIPAL CENTRÉ sur la page (pas à droite du logo)
          doc.setTextColor(255, 255, 255);
          doc.setFontSize(13);
          doc.setFont("helvetica", "bold");
          const titreHeader = isVT ? "RAPPORT DE VISITE TECHNIQUE" : "RAPPORT DE VISITE DE CHANTIER";
          doc.text(titreHeader, pageWidth / 2, 11, { align: "center" });

          // Sous-ligne centrée : référence chantier — n° visite (sous le titre)
          doc.setFontSize(9);
          doc.setFont("helvetica", "normal");
          doc.setTextColor(255, 255, 255);
          const sousLigne = `${this.selectedChantier.code} — ${this.selectedChantier.nom}  ·  ${this.selectedVisite.numero_vc}`;
          doc.text(sousLigne, pageWidth / 2, 17, { align: "center" });

          y = 32;

          // Titre principal — utilise la couleur du thème
          doc.setTextColor(...T.titleText);
          doc.setFontSize(20);
          doc.setFont("helvetica", "bold");
          doc.text(isVT ? "COMPTE RENDU DE VISITE TECHNIQUE" : "COMPTE RENDU DE VISITE", pageWidth / 2, y, { align: "center" });
          y += 7;

          // Date sous le titre (avant le trait)
          doc.setFontSize(11);
          doc.setTextColor(80, 80, 80);
          doc.setFont("helvetica", "normal");
          doc.text(this.formatDateFull(this.selectedVisite.date_visite), pageWidth / 2, y, { align: "center" });
          y += 5;

          // Ligne décorative (couleur d'accent du thème)
          doc.setDrawColor(...T.accent);
          doc.setLineWidth(0.8);
          doc.line(pageWidth/2 - 25, y, pageWidth/2 + 25, y);
          y += 7;

          // ===== ENCADRÉ "ENTREPRISE CONCERNÉE" — uniquement pour VT =====
          if (isVT) {
            let entrepriseInfo = this.selectedVisite.entreprise;
            if (!entrepriseInfo && this.selectedVisite.entreprise_id) {
              entrepriseInfo = (this.chantierIntervenants || []).find(i => i.id === this.selectedVisite.entreprise_id);
            }
            const entrepriseSociete = entrepriseInfo?.societe || "";
            const entrepriseNom = entrepriseInfo?.nom_complet || "";
            const entrepriseType = entrepriseInfo?.type || "";
            const entrepriseLigne1 = entrepriseSociete || entrepriseNom || "—";
            const entrepriseLigne2 = (entrepriseSociete && entrepriseNom)
              ? entrepriseNom + (entrepriseType ? "  ·  " + entrepriseType : "")
              : (entrepriseType || "");

            const encH = entrepriseLigne2 ? 18 : 14;
            doc.setFillColor(...T.boxBg);
            doc.setDrawColor(...T.accentBox);
            doc.setLineWidth(0.5);
            doc.roundedRect(marginX, y, pageWidth - 2 * marginX, encH, 1.5, 1.5, "FD");

            doc.setFontSize(8);
            doc.setTextColor(...T.accent);
            doc.setFont("helvetica", "bold");
            doc.text("ENTREPRISE CONCERNÉE", marginX + 4, y + 5);

            doc.setFontSize(12);
            doc.setTextColor(...T.boxText);
            doc.setFont("helvetica", "bold");
            doc.text(entrepriseLigne1, marginX + 4, y + 11);

            if (entrepriseLigne2) {
              doc.setFontSize(9);
              doc.setTextColor(...T.accent);
              doc.setFont("helvetica", "normal");
              doc.text(entrepriseLigne2, marginX + 4, y + 16);
            }

            y += encH + 4;
          }

          // ===== Filtrage des intervenants pour le tableau =====
          // VC : tous les intervenants liés au chantier
          // VT : uniquement ceux de l'entreprise concernée (par id ou par nom de société)
          // Calculé EN AMONT du tableau infos générales pour qu'on puisse y injecter
          // les contacts entreprise dans la section destinataires (en VT).
          let liensPourTableau = this.liens || [];
          if (isVT) {
            let entrepriseRef = this.selectedVisite.entreprise;
            if (!entrepriseRef && this.selectedVisite.entreprise_id) {
              entrepriseRef = (this.chantierIntervenants || []).find(i => i.id === this.selectedVisite.entreprise_id);
            }
            const societeRef = (entrepriseRef?.societe || "").trim().toLowerCase();
            const idRef = entrepriseRef?.id || this.selectedVisite.entreprise_id;
            liensPourTableau = liensPourTableau.filter(l => {
              const inter = l.intervenants;
              if (!inter) return false;
              if (idRef && inter.id === idRef) return true;
              if (societeRef && (inter.societe || "").trim().toLowerCase() === societeRef) return true;
              return false;
            });
          }

          // Pour les VT : préparer le bloc "CONTACT ENTREPRISE" qui sera injecté
          // directement dans le tableau infos générales (1 ligne par contact, multi-lignes possible)
          let contactEntrepriseText = "";
          if (isVT && liensPourTableau.length > 0) {
            const lignes = liensPourTableau.map(l => {
              const inter = l.intervenants;
              if (!inter) return "";
              const role = inter.type ? ` (${inter.type})` : "";
              const parts = [];
              if (inter.email) parts.push(inter.email);
              if (inter.telephone) parts.push(inter.telephone);
              const contacts = parts.length > 0 ? "  ·  " + parts.join("  ·  ") : "";
              return `${inter.nom_complet}${role}${contacts}`;
            }).filter(Boolean);
            contactEntrepriseText = lignes.join("\n");
          }

          // ===== TABLEAU INFOS GÉNÉRALES =====
          // En VT : ligne supplémentaire "CONTACT ENTREPRISE" après les destinataires
          //         (le bloc séparé "CONTACT ENTREPRISE" plus bas est ainsi supprimé pour les VT)
          const tableauInfosBody = [
            ["CHANTIER", `${this.selectedChantier.code} — ${this.selectedChantier.nom}`],
            ["ADRESSE", `${this.selectedChantier.adresse || ""}, ${this.selectedChantier.cp || ""} ${this.selectedChantier.ville || ""}`.replace(/^,\s+/, "").replace(/,\s*$/, "")],
            ["DATE", this.formatDateFull(this.selectedVisite.date_visite)],
            ["HORAIRES", this.formatHoraires(this.selectedVisite)],
            ["MÉTÉO", this.selectedVisite.meteo || "—"],
            ["RÉDIGÉ PAR", this.selectedVisite.redacteur || "—"],
            ["DESTINATAIRES", destinatairesText],
          ];
          if (isVT && contactEntrepriseText) {
            tableauInfosBody.push(["CONTACT", contactEntrepriseText]);
          }

          doc.autoTable({
            startY: y,
            theme: "grid",
            styles: { fontSize: 9, cellPadding: 2, lineColor: [200, 210, 225] },
            headStyles: { fillColor: T.primary, textColor: [255, 255, 255], fontStyle: "bold" },
            columnStyles: {
              0: { fillColor: T.labelBg, textColor: T.labelText, fontStyle: "bold", cellWidth: 38 },
              1: { cellWidth: "auto", textColor: [50, 50, 50] }
            },
            body: tableauInfosBody,
          });

          y = doc.lastAutoTable.finalY + 6;

          // ===== TABLEAU INTERVENANTS (uniquement pour les VC) =====
          // En VT, les contacts sont déjà intégrés dans le tableau infos générales (ligne CONTACT) ci-dessus.
          if (!isVT && liensPourTableau.length > 0) {
            // ===== Mode VC : tableau classique avec colonnes P/D/RÔLE/NOM/SOCIÉTÉ/EMAIL/TÉL =====
            const orderType = { 'MO': 1, 'MOE': 2, 'Hébergeur': 3, 'SPS': 4, 'BCT': 5, 'Entreprise': 6 };
            const liensTries = [...liensPourTableau].sort((a, b) => {
              const ta = a.intervenants?.type || "";
              const tb = b.intervenants?.type || "";
              const oa = orderType[ta] || 99;
              const ob = orderType[tb] || 99;
              if (oa !== ob) return oa - ob;
              return (a.intervenants?.nom_complet || "").localeCompare(b.intervenants?.nom_complet || "");
            });

            this.checkPageBreak(doc, y, 40);
            y = this.addSectionTitlePdf(doc, y, "INTERVENANTS", isVT);

            const body = liensTries.map(l => {
              const interId = l.intervenants?.id;
              const isPresent = presentsIds.has(interId);
              const isDiffuse = diffusionIds.has(interId);
              return [
                isPresent ? "P" : "",
                isDiffuse ? "D" : "",
                l.intervenants?.type || "",
                l.intervenants?.nom_complet || "",
                l.intervenants?.societe || "",
                l.intervenants?.email || "",
                l.intervenants?.telephone || "",
              ];
            });

            doc.autoTable({
              startY: y,
              theme: "grid",
              // Typo alignée sur le tableau réserves : fontSize 8, cellPadding 2
              styles: {
                fontSize: 8,
                cellPadding: 2,
                lineColor: [200, 210, 225],
                overflow: 'linebreak',
                valign: "middle",
              },
              headStyles: {
                fillColor: T.primary,
                textColor: [255, 255, 255],
                fontStyle: "bold",
                halign: "center",
              },
              columnStyles: {
                0: { halign: "center", cellWidth: 8, fontStyle: "bold" },         // P
                1: { halign: "center", cellWidth: 8, fontStyle: "bold" },         // D
                2: { fontStyle: "bold", cellWidth: 19, halign: "center" },        // Rôle
                3: { cellWidth: 30, fontStyle: "bold" },                          // Nom
                4: { cellWidth: 30 },                                             // Société
                5: { cellWidth: 52, fontSize: 7 },                                // Email
                6: { cellWidth: 'auto', fontSize: 7.5 },                          // Tél
              },
              head: [["P", "D", "RÔLE", "NOM", "SOCIÉTÉ", "EMAIL", "TÉL"]],
              body: body,
              didParseCell: (data) => {
                if (data.section !== "body") return;
                if (data.column.index === 0 && data.cell.raw === "P") {
                  data.cell.styles.textColor = [220, 38, 38];
                  data.cell.styles.fontStyle = "bold";
                  data.cell.styles.fontSize = 10;
                } else if (data.column.index === 1 && data.cell.raw === "D") {
                  data.cell.styles.textColor = [22, 163, 74];
                  data.cell.styles.fontStyle = "bold";
                  data.cell.styles.fontSize = 10;
                }
              }
            });

            y = doc.lastAutoTable.finalY + 8;
          }

          // ===== SECTIONS VC (Base vie / Planning / Sécurité) — uniquement si la visite n'est PAS une VT =====
          if (!isVT) {
            // ===== SECTION BASE VIE =====
            if (this.selectedVisite.base_vie_intro || this.selectedVisite.base_vie_detail || this.selectedVisite.base_vie_stockage || this.selectedVisite.base_vie_stationnement || this.selectedVisite.base_vie_dechets) {
              y = this.addSectionTitlePdf(doc, y, "INSTALLATION BASE VIE, STOCKAGE ET DÉCHETS");
              if (this.selectedVisite.base_vie_intro) y = this.addParagraph(doc, y, this.selectedVisite.base_vie_intro);
              if (this.selectedVisite.base_vie_detail) y = this.addLabeledText(doc, y, "Base vie", this.selectedVisite.base_vie_detail);
              if (this.selectedVisite.base_vie_stockage) y = this.addLabeledText(doc, y, "Zone de stockage", this.selectedVisite.base_vie_stockage);
              if (this.selectedVisite.base_vie_stationnement) y = this.addLabeledText(doc, y, "Stationnement", this.selectedVisite.base_vie_stationnement);
              if (this.selectedVisite.base_vie_dechets) y = this.addLabeledText(doc, y, "Benne et déchets", this.selectedVisite.base_vie_dechets);
              y += 2;
            }

            // ===== SECTION PLANNING =====
            if (this.selectedVisite.planning_intro || this.selectedVisite.planning_remarques) {
              y = this.addSectionTitlePdf(doc, y, "PLANNING");
              if (this.selectedVisite.planning_intro) y = this.addParagraph(doc, y, this.selectedVisite.planning_intro);
              if (this.selectedVisite.planning_remarques) y = this.addLabeledText(doc, y, "Remarques importantes", this.selectedVisite.planning_remarques);
              y += 2;
            }

            // ===== SECTION SÉCURITÉ =====
            if (this.selectedVisite.securite_intro || this.selectedVisite.securite_par_entreprise) {
              y = this.addSectionTitlePdf(doc, y, "SÉCURITÉ");
              if (this.selectedVisite.securite_intro) y = this.addParagraph(doc, y, this.selectedVisite.securite_intro);
              if (this.selectedVisite.securite_par_entreprise) y = this.addParagraph(doc, y, this.selectedVisite.securite_par_entreprise);
              y += 2; // saut très réduit avant Réserves
            }
          }

          // ===== SECTIONS VT (Constats / Actions) — uniquement si la visite est une VT =====
          if (isVT) {
            // ===== SECTION REMARQUES (anciennement CONSTATS) =====
            if (this.selectedVisite.constats_intro || this.selectedVisite.constats_detail) {
              y = this.addSectionTitlePdf(doc, y, "REMARQUES", true);
              if (this.selectedVisite.constats_intro) y = this.addParagraph(doc, y, this.selectedVisite.constats_intro);
              if (this.selectedVisite.constats_detail) y = this.addParagraph(doc, y, this.selectedVisite.constats_detail);
              y += 2;
            }

            // ===== SECTION ACTIONS =====
            if (this.selectedVisite.actions_intro || this.selectedVisite.actions_detail) {
              y = this.addSectionTitlePdf(doc, y, "ACTIONS CORRECTIVES", true);
              if (this.selectedVisite.actions_intro) y = this.addParagraph(doc, y, this.selectedVisite.actions_intro);
              if (this.selectedVisite.actions_detail) y = this.addParagraph(doc, y, this.selectedVisite.actions_detail);
              y += 2;
            }
          }

          // ===== TABLEAU RÉSERVES =====
          if (this.reservesVisite.length > 0) {
            this.checkPageBreak(doc, y, 30);
            y = this.addSectionTitlePdf(doc, y, "RÉSERVES & ACTIONS DE SUIVI", isVT);

            // Trier les réserves : ouvertes critiques d'abord, levées en dernier
            const sortedReserves = [...this.reservesVisite].sort((a, b) => {
              if (a.statut === "Levée" && b.statut !== "Levée") return 1;
              if (a.statut !== "Levée" && b.statut === "Levée") return -1;
              const ra = a.nb_rappels || 0;
              const rb = b.nb_rappels || 0;
              if (ra !== rb) return rb - ra;
              return (a.numero || "").localeCompare(b.numero || "");
            });

            doc.autoTable({
              startY: y,
              theme: "grid",
              styles: { fontSize: 8, cellPadding: 2, valign: "middle", lineColor: [200, 210, 225] },
              headStyles: {
                fillColor: T.primary,
                textColor: [255, 255, 255],
                fontStyle: "bold",
                halign: "center",
              },
              head: [["N°", "DESCRIPTION", "RESPONSABLE", "ÉCHÉANCE", "PRIORITÉ", "RAPP.", "STATUT"]],
              body: sortedReserves.map(r => {
                // Description = description courte + description complète + action attendue (avec flèche)
                // ⚠ jsPDF par défaut (Helvetica) ne supporte que Latin-1 (ISO-8859-1).
                // → (U+2192) et ✓ (U+2713) sont hors Latin-1 → ils sont remplacés par "?" ou "!"
                // et déforment le rendu (espacement caractères). On utilise donc des caractères Latin-1 :
                //   - "»" (U+00BB) pour la petite flèche d'action attendue
                //   - "OK" pour le check de levée
                let desc = r.description_courte || "";
                if (r.description_complete) desc += "\n" + r.description_complete;
                if (r.action_attendue && r.statut === "Ouverte") {
                  desc += "\n» " + r.action_attendue;
                }
                const descWithLevee = r.statut === "Levée"
                  ? desc + "\n\nOK Levée le " + this.formatDate(r.date_levee) + (r.commentaire_levee ? " — " + r.commentaire_levee : "")
                  : desc;
                
                // Responsable + société sur 2 lignes
                // Source de la société (par ordre de priorité) :
                //   1. r.responsable_societe (stocké dans la réserve)
                //   2. chantierIntervenants[responsable_id].societe (annuaire chantier)
                //   3. rien
                let responsableCell = r.responsable || "—";
                if (r.responsable) {
                  let societe = r.responsable_societe || "";
                  if (!societe && r.responsable_id) {
                    const inter = this.chantierIntervenants.find(i => i.id === r.responsable_id);
                    if (inter && inter.societe) societe = inter.societe;
                  }
                  if (societe) responsableCell = r.responsable + "\n" + societe;
                }
                
                const rappelLabel = (r.nb_rappels && r.nb_rappels > 0) 
                  ? "R" + r.nb_rappels 
                  : "—";
                return [
                  r.numero,
                  descWithLevee,
                  responsableCell,
                  this.formatDate(r.echeance),
                  r.priorite || "",
                  rappelLabel,
                  r.statut || "",
                ];
              }),
              columnStyles: {
                // N° : 18mm pour permettre "R-VT-001" sur une seule ligne
                0: { cellWidth: 18, fontStyle: "bold", halign: "center" },
                // Description : "auto" — prend tout l'espace restant
                1: { cellWidth: "auto" },
                // Colonnes droites : élargies pour ne plus couper les textes
                2: { cellWidth: 30 },                       // Responsable + Société
                3: { cellWidth: 22, halign: "center" },     // Échéance ("31/12/2026" lisible)
                4: { cellWidth: 18, halign: "center" },     // Priorité ("Normale" lisible)
                5: { cellWidth: 12, halign: "center", fontStyle: "bold" }, // Rappel
                6: { cellWidth: 17, halign: "center" },     // Statut ("Ouverte"/"Levée" lisible)
              },
              didParseCell: (data) => {
                if (data.section !== "body") return;
                const reserve = sortedReserves[data.row.index];
                if (!reserve) return;
                
                if (reserve.statut === "Levée") {
                  data.cell.styles.fillColor = [240, 240, 240];
                  data.cell.styles.textColor = [120, 120, 120];
                  return;
                }
                if (reserve.nb_rappels >= 2) {
                  data.cell.styles.fillColor = [254, 226, 226];
                  return;
                }
                const today = new Date().toISOString().split('T')[0];
                const enRetard = reserve.echeance && reserve.echeance < today;
                if (reserve.nb_rappels === 1 || enRetard) {
                  data.cell.styles.fillColor = [255, 237, 213];
                  return;
                }
                data.cell.styles.fillColor = [240, 253, 244];
              },
            });

            y = doc.lastAutoTable.finalY + 5;

            // Légende plus discrète
            this.checkPageBreak(doc, y, 12);
            doc.setFontSize(7);
            doc.setTextColor(120, 120, 120);
            doc.setFont("helvetica", "normal");
            doc.text("Légende :", 14, y);
            
            doc.setFillColor(240, 253, 244);
            doc.rect(28, y - 2.5, 3, 3, "F");
            doc.text("Dans les délais", 32, y);
            
            doc.setFillColor(255, 237, 213);
            doc.rect(60, y - 2.5, 3, 3, "F");
            doc.text("En retard ou 1 rappel", 64, y);
            
            doc.setFillColor(254, 226, 226);
            doc.rect(105, y - 2.5, 3, 3, "F");
            doc.text("Escalade (2+ rappels)", 109, y);
            
            doc.setFillColor(240, 240, 240);
            doc.rect(150, y - 2.5, 3, 3, "F");
            doc.text("Levée", 154, y);
            
            y += 6;
          }

          // ===== ANNEXE PHOTOS =====
          // Collecter toutes les photos liées à cette visite :
          //   - Photos directes de la visite (photosVisite)
          //   - Photos de TOUTES les réserves affichées dans la visite (créées ici OU reportées d'une visite antérieure)
          //     → permet de voir les photos d'une réserve même quand elle apparaît dans des visites postérieures
          const reserveIdsAffichees = (this.reservesVisite || []).map(r => r.id).filter(Boolean);
          // Mapping reserve_id → numero (pour étiqueter chaque photo de réserve dans la légende du PDF)
          const reserveNumeroById = {};
          for (const r of (this.reservesVisite || [])) {
            reserveNumeroById[r.id] = r.numero;
          }
          let photosAnnexe = [...this.photosVisite];

          if (reserveIdsAffichees.length > 0) {
            try {
              const { data: photosReserves, error: errPhotos } = await supabaseClient
                .from('photos')
                .select('*')
                .in('reserve_id', reserveIdsAffichees)
                .order('created_at', { ascending: false });
              if (errPhotos) {
                console.warn("Erreur chargement photos réserves:", errPhotos);
              }
              if (photosReserves && photosReserves.length > 0) {
                photosAnnexe = photosAnnexe.concat(photosReserves);
              }
            } catch (e) {
              console.warn("Exception chargement photos réserves:", e);
            }
          }

          if (photosAnnexe.length > 0) {
            // Page de garde annexe — couleurs du thème (orange pour VT, bleu pour VC)
            doc.addPage();
            const annexeY = pageHeight / 2 - 20;
            doc.setFillColor(...T.primary);
            doc.rect(0, 0, pageWidth, 15, "F");
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(14);
            doc.setFont("helvetica", "bold");
            doc.text("PHENIX SOLAR", 14, 10);
            doc.setTextColor(...T.accent);
            doc.setFontSize(10);
            doc.text("RAPPORTS DE VISITE", pageWidth - 14, 10, { align: "right" });

            doc.setTextColor(...T.titleText);
            doc.setFontSize(28);
            doc.setFont("helvetica", "bold");
            doc.text("ANNEXE", pageWidth / 2, annexeY, { align: "center" });

            doc.setFontSize(20);
            doc.setTextColor(...T.accent);
            doc.text("PHOTOS DE LA VISITE", pageWidth / 2, annexeY + 12, { align: "center" });

            doc.setFontSize(14);
            doc.setTextColor(70, 70, 70);
            doc.setFont("helvetica", "normal");
            doc.text(`${this.selectedChantier.code} — ${this.selectedVisite.numero_vc}`, pageWidth / 2, annexeY + 28, { align: "center" });
            doc.text(`${photosAnnexe.length} photo${photosAnnexe.length > 1 ? 's' : ''}`, pageWidth / 2, annexeY + 36, { align: "center" });

            // Pages photos : 4 par page (2x2)
            // Format : page A4 = 210x297mm
            // marges 10mm tout autour
            // 2 colonnes x 2 rangées = chaque cellule fait ~95x130 mm avec gaps
            const photosByPage = 4;
            const cellW = 88;
            const cellH = 110;
            const gapX = 8;
            const gapY = 12;
            const startX = (pageWidth - (cellW * 2 + gapX)) / 2;
            const startY = 25;

            for (let i = 0; i < photosAnnexe.length; i++) {
              const photo = photosAnnexe[i];
              const idxOnPage = i % photosByPage;
              const row = Math.floor(idxOnPage / 2);
              const col = idxOnPage % 2;

              if (idxOnPage === 0) {
                // Nouvelle page — bandeau couleur du thème
                doc.addPage();
                doc.setFillColor(...T.primary);
                doc.rect(0, 0, pageWidth, 15, "F");
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(11);
                doc.setFont("helvetica", "bold");
                doc.text(`PHOTOS — ${this.selectedChantier.code} — ${this.selectedVisite.numero_vc}`, pageWidth / 2, 10, { align: "center" });
              }

              const x = startX + col * (cellW + gapX);
              const y = startY + row * (cellH + gapY);

              // Charger l'image et l'ajouter
              try {
                const imgData = await this.loadImageAsDataURL(photo.url_storage);
                if (imgData) {
                  // Calculer taille en gardant ratio
                  const imgRatio = imgData.width / imgData.height;
                  let drawW = cellW;
                  let drawH = cellH - 20; // garder espace pour légende
                  
                  if (drawW / drawH > imgRatio) {
                    drawW = drawH * imgRatio;
                  } else {
                    drawH = drawW / imgRatio;
                  }

                  // Centrer l'image
                  const imgX = x + (cellW - drawW) / 2;
                  const imgY = y + (cellH - 20 - drawH) / 2;

                  doc.addImage(imgData.dataUrl, 'JPEG', imgX, imgY, drawW, drawH);
                }
              } catch(e) {
                // Cadre vide si erreur de chargement
                doc.setDrawColor(200, 200, 200);
                doc.rect(x, y, cellW, cellH - 20);
                doc.setFontSize(8);
                doc.setTextColor(150, 150, 150);
                doc.text("[image non chargée]", x + cellW/2, y + cellH/2 - 10, { align: "center" });
              }

              // Légende sous l'image
              // Préfixe par le n° de réserve si la photo est liée à une réserve
              const numReserve = photo.reserve_id ? reserveNumeroById[photo.reserve_id] : null;
              doc.setFontSize(8);
              if (numReserve) {
                // Photo liée à une réserve : badge orange/rouge avec n° de réserve
                doc.setTextColor(220, 38, 38); // rouge pour signaler "réserve"
                doc.setFont("helvetica", "bold");
                doc.text(numReserve, x, y + cellH - 13);
              } else {
                // Photo générale de la visite — couleur primaire du thème (bleu VC, orange VT)
                doc.setTextColor(...T.titleText);
                doc.setFont("helvetica", "bold");
                doc.text(`Photo ${i + 1}`, x, y + cellH - 13);
              }

              if (photo.legende) {
                doc.setTextColor(50, 50, 50);
                doc.setFont("helvetica", "normal");
                const legendeLines = doc.splitTextToSize(photo.legende, cellW);
                doc.text(legendeLines.slice(0, 2), x, y + cellH - 8);
              }

              if (photo.localisation) {
                doc.setFontSize(7);
                doc.setTextColor(120, 120, 120);
                doc.setFont("helvetica", "italic");
                const locLines = doc.splitTextToSize(`Lieu : ${photo.localisation}`, cellW);
                doc.text(locLines.slice(0, 1), x, y + cellH - 1);
              }
            }
          }

          // ===== FOOTER =====
          const pageCount = doc.internal.getNumberOfPages();

          for (let i = 1; i <= pageCount; i++) {
            doc.setPage(i);

            // Footer normal
            doc.setFontSize(8);
            doc.setTextColor(128, 128, 128);
            doc.setFont("helvetica", "normal");
            // Pied de page : Phenix Solar — CODE — NOM_CHANTIER — N°visite — Page X/Y
            // Permet d'identifier rapidement le projet d'un coup d'œil sans dépendre uniquement du code.
            const footer = `Phenix Solar — ${this.selectedChantier.code} — ${this.selectedChantier.nom} — ${this.selectedVisite.numero_vc} — Page ${i}/${pageCount}`;
            doc.text(footer, pageWidth / 2, pageHeight - 8, { align: "center" });
          }

          // ===== TÉLÉCHARGEMENT =====
          // Nom du fichier au format demandé : "CS2-8404-Bleu Vert - Rapport VC02 05.05.2026.pdf"
          // Centralisé dans _construireNomFichierPdf pour cohérence avec l'attachement Outlook Graph.
          const filename = this._construireNomFichierPdf();

          // Aperçu dans nouvelle fenêtre + téléchargement
          const blob = doc.output("blob");
          const url = URL.createObjectURL(blob);
          window.open(url, "_blank");

          // Téléchargement automatique
          doc.save(filename);

          this.showToast("Rapport PDF généré ✓", "success");
        },

        // ===== HELPERS PDF =====
        // Charger une image depuis une URL et la convertir en dataURL
        // (nécessaire car jsPDF ne peut pas charger directement une URL)
        loadImageAsDataURL(url) {
          return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = 'anonymous'; // pour CORS Supabase
            img.onload = () => {
              try {
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                resolve({ dataUrl, width: img.naturalWidth, height: img.naturalHeight });
              } catch(e) {
                reject(e);
              }
            };
            img.onerror = () => reject(new Error('Image load error'));
            // Timeout 10 sec
            setTimeout(() => reject(new Error('Timeout')), 10000);
            img.src = url;
          });
        },
        checkPageBreak(doc, y, neededSpace) {
          const pageHeight = doc.internal.pageSize.getHeight();
          if (y + neededSpace > pageHeight - 20) {
            doc.addPage();
            return 20;
          }
          return y;
        },

        addSectionTitle(doc, y, title) {
          // Compatibilité ancienne signature
          return this.addSectionTitlePdf(doc, y, title);
        },

        addSectionTitlePdf(doc, y, title, isVT = false) {
          y = this.checkPageBreak(doc, y, 18);
          const pageWidth = doc.internal.pageSize.getWidth();
          const T = this.getPdfTheme(isVT ? "VT" : "VC");
          // Bandeau couleur primaire du thème
          doc.setFillColor(...T.primary);
          doc.rect(14, y, pageWidth - 28, 8, "F");
          // Bande d'accent à gauche
          doc.setFillColor(...T.accent);
          doc.rect(14, y, 3, 8, "F");
          doc.setTextColor(255, 255, 255);
          doc.setFontSize(11);
          doc.setFont("helvetica", "bold");
          doc.text(title, 20, y + 5.5);
          return y + 14;
        },

        // Paragraphe simple (police standard du corps de document)
        // Police de référence du corps : 10pt, ligne 5mm, retrait gauche 14mm.
        // Tous les autres helpers texte de section doivent s'aligner dessus pour éviter les écarts visuels.
        addParagraph(doc, y, text) {
          if (!text) return y;
          y = this.checkPageBreak(doc, y, 10);
          doc.setTextColor(40, 40, 40);
          doc.setFontSize(10);
          doc.setFont("helvetica", "normal");
          const splitText = doc.splitTextToSize(text, doc.internal.pageSize.getWidth() - 28);
          doc.text(splitText, 14, y);
          return y + splitText.length * 5 + 3;
        },

        // Bloc "label + texte" (ex: "Base vie", "Stationnement"…)
        // Le label est en gras bleu plus petit (sous-titre), MAIS le texte reprend exactement
        // la même police et le même retrait que addParagraph pour rester aligné avec le reste.
        addLabeledText(doc, y, label, text) {
          if (!text) return y;
          y = this.checkPageBreak(doc, y, 12);

          // Petit carré jaune décoratif à gauche (puce)
          doc.setFillColor(242, 172, 16);
          doc.rect(14, y - 3, 2.5, 2.5, "F");

          // Label : 9pt bold bleu (sous-titre), retrait 18mm pour passer après la puce
          doc.setTextColor(13, 68, 132);
          doc.setFontSize(9);
          doc.setFont("helvetica", "bold");
          doc.text(label, 18, y);
          y += 5;

          // Texte : 10pt normal, retrait 14mm, ligne 5mm — IDENTIQUE à addParagraph
          // (avant : 9pt avec retrait 18mm et ligne 4.5mm → écart visuel par rapport au reste)
          doc.setTextColor(40, 40, 40);
          doc.setFontSize(10);
          doc.setFont("helvetica", "normal");
          const splitText = doc.splitTextToSize(text, doc.internal.pageSize.getWidth() - 28);
          doc.text(splitText, 14, y);
          return y + splitText.length * 5 + 3;
        },

        // === Formater les présents pour le tableau infos générales du PDF ===
        formatPresentsForPdf() {
          const tags = (this.selectedVisite.presents_ids || []).map(p => p.nom).filter(Boolean);
          const texteLibre = (this.selectedVisite.presents || "").trim();
          const all = [];
          if (tags.length > 0) all.push(tags.join(", "));
          if (texteLibre) all.push(texteLibre);
          return all.length > 0 ? all.join(" · ") : "—";
        },

        // === Formater les horaires (HH:MM - HH:MM) ===
        formatHoraires(visite) {
          const debut = visite.heure_debut ? visite.heure_debut.slice(0, 5) : "";
          const fin = visite.heure_fin ? visite.heure_fin.slice(0, 5) : "";
          if (debut && fin) return `${debut} - ${fin}`;
          if (debut) return `Début ${debut}`;
          if (fin) return `Fin ${fin}`;
          return "—";
        },
      };
    }
  </script>

  <!-- ===== PWA : enregistrement du service worker + gestion hors-ligne ===== -->
  <script>
    (function () {
      // 1) Bandeau hors-ligne + toast de retour en ligne
      var banner = document.getElementById("offline-banner");
      var onlineToast = document.getElementById("online-toast");
      var wasOffline = !navigator.onLine; // état initial
      function updateOnlineStatus() {
        var isOnline = navigator.onLine;
        if (banner) banner.style.display = isOnline ? "none" : "block";
        // Si on était offline et qu'on repasse online → toast "connexion rétablie" 3s
        if (isOnline && wasOffline && onlineToast) {
          onlineToast.style.display = "block";
          setTimeout(function () { onlineToast.style.display = "none"; }, 3000);
        }
        wasOffline = !isOnline;
      }
      window.addEventListener("online", updateOnlineStatus);
      window.addEventListener("offline", updateOnlineStatus);
      updateOnlineStatus();

      // Helper exposé : vide le cache Supabase via message au Service Worker
      // Appelé à la déconnexion pour ne pas exposer les données de l'utilisateur précédent
      window.__phenixClearSupabaseCache = function () {
        try {
          if (navigator.serviceWorker && navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({ type: "CLEAR_SUPABASE_CACHE" });
          }
        } catch (e) { /* silencieux */ }
      };

      // 2) Bouton "Installer l'app" (Android / Chrome / Edge desktop)
      var deferredPrompt = null;
      var installBtn = document.getElementById("install-button");
      window.addEventListener("beforeinstallprompt", function (e) {
        e.preventDefault();
        deferredPrompt = e;
        updateInstallBtnVisibility();
      });
      window.__phenixInstall = function () {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function (choice) {
          if (choice.outcome === "accepted") {
            if (installBtn) installBtn.style.display = "none";
          }
          deferredPrompt = null;
        });
      };
      window.addEventListener("appinstalled", function () {
        if (installBtn) installBtn.style.display = "none";
        deferredPrompt = null;
      });

      // Masque le bouton install quand une modale est ouverte (évite d'empiéter sur les actions du formulaire).
      // On détecte la présence d'un overlay de modale (Alpine insère un div .fixed.inset-0 quand modal !== null).
      var installBtnDesiredDisplay = "inline-flex"; // valeur quand le bouton doit être visible
      function updateInstallBtnVisibility() {
        if (!installBtn) return;
        if (!deferredPrompt) return; // si pas installable, on ne touche à rien (reste display:none)
        var hasModal = !!document.querySelector('.fixed.inset-0.z-\\[60\\], .fixed.inset-0.z-\\[70\\]');
        installBtn.style.display = hasModal ? "none" : installBtnDesiredDisplay;
      }
      var domObserver = new MutationObserver(updateInstallBtnVisibility);
      domObserver.observe(document.body, { childList: true, subtree: true });

      // 3) Bandeau iOS (Safari ne déclenche jamais beforeinstallprompt → instructions manuelles)
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      var isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
      var iosBannerDismissed = localStorage.getItem("phenix-ios-banner-dismissed") === "1";
      if (isIOS && !isStandalone && !iosBannerDismissed) {
        var iosBanner = document.getElementById("ios-install-banner");
        if (iosBanner) {
          // Affiche le bandeau après 3 secondes pour ne pas être agressif
          setTimeout(function () { iosBanner.style.display = "block"; }, 3000);
        }
      }

      // 4) Enregistrement du service worker
      // Note : ne fonctionne qu'en HTTPS (ou localhost). En ouverture directe via file:// → ignoré.
      if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1")) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("sw.js").then(function (reg) {
            // Détecte une nouvelle version
            reg.addEventListener("updatefound", function () {
              var nw = reg.installing;
              if (!nw) return;
              nw.addEventListener("statechange", function () {
                if (nw.state === "installed" && navigator.serviceWorker.controller) {
                  // Nouvelle version dispo → afficher le bandeau
                  var ub = document.getElementById("update-banner");
                  if (ub) ub.style.display = "flex";
                  window.__phenixApplyUpdate = function () {
                    nw.postMessage({ type: "SKIP_WAITING" });
                  };
                }
              });
            });
          }).catch(function (err) {
            console.warn("Service worker non enregistré :", err);
          });

          // Recharge la page une fois le nouveau service worker activé
          var refreshing = false;
          navigator.serviceWorker.addEventListener("controllerchange", function () {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
          });
        });
      }
    })();
  </script>
