  <script>
    // ============================================
    // CONFIG SUPABASE
    // ============================================
    const SUPABASE_URL = "https://svjdtykwnaaendgoqhrk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2amR0eWt3bmFhZW5kZ29xaHJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NDUxNjEsImV4cCI6MjA5MzQyMTE2MX0.4g7GsNJbPPaE8Qu9vdwzKgiRpfd13oaRQAUypQ39pPw";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================
    // APPLICATION ALPINE.JS
    // ============================================
    function app() {
      return {
        // État global
        loading: true,
        user: null,
        view: "dashboard", // dashboard | chantiers | chantier | visite | visite-interne | intervenants
        toast: null,

        // Login
        loginForm: { email: "", password: "" },
        loginLoading: false,
        loginError: "",

        // Données
        chantiers: [],
        selectedChantier: null,
        visites: [],
        visitesVT: [], // Visites techniques (VT) — séparées des VC
        // ===== ARCHIVES =====
        // Liste des visites archivées du chantier (chargée à la demande dans la vue Archives)
        visitesArchivees: [],
        // Modale "Suppression définitive" : on stocke la visite à supprimer + l'état d'avancement
        suppressionVisite: null,
        suppressionStep: "init",  // 'init' | 'downloading-pdf' | 'downloading-photos' | 'confirming' | 'deleting'
        suppressionPhotosCount: 0,
        liens: [],
        reservesOuvertes: [],
        selectedVisite: null,
        reservesVisite: [],
        intervenants: [],
        intervenantsActifs: [],
        
        // Visites internes (VI)
        visitesInternes: [],
        showVisitesInternes: false,
        viForm: { id: null, numero_vc: "", date_visite: "", heure_debut: "", heure_fin: "", meteo: "", presents: "", notes_libres: "" },

        // Dashboard
        dashStats: { chantiersActifs: 0, visitesMois: 0, reservesOuvertes: 0, escalades: 0 },
        dashEscalades: [],
        dashRetards: [],
        dashEcheances: [],
        dashVisitesRecentes: [],
        dashChantiersActifs: [],
        dashBrouillon: null,
        searchQuery: "",
        searchResults: [],
        searchTimer: null,

        // Filtres
        filterArchive: false,
        filterType: "",
        intervenantSearchQuery: "",
        intervenantsFiltered: [],
        filterPhenixOnly: false,

        // Annuaire pour les sélecteurs (intervenants liés au chantier)
        chantierIntervenants: [], // tous les intervenants liés au chantier en cours
        membresPhenix: [],         // tous les intervenants Phenix Solar (pour responsable)
        
        // Sélecteurs (recherche dans formulaire)
        responsableSearchQuery: "",
        responsableSearchOpen: false,
        presentsSearchQuery: "",
        presentsSearchOpen: false,
        reserveResponsableSearchQuery: "",
        reserveResponsableSearchOpen: false,
        destinatairesSearchQuery: "",
        destinatairesSearchOpen: false,
        
        // Création d'intervenant depuis une autre modale
        intervenantOrigin: null, // null | 'present' | 'destinataire'
        
        // VC précédente (pour comparaison vert/gris)
        previousVisite: null, // contient les sections texte de la VC précédente
        
        // Modale destinataires PDF
        pdfDestList: [],
        pdfDestExtraEmail: "",

        // Modales
        modal: null, // null | 'chantier' | 'intervenant' | 'lier' | 'confirm'
        previousModal: null, // pour modale-dans-modale
        formLoading: false,
        formError: "",

        // Form data (initialisés vides)
        chantierForm: { id: null, code: "", nom: "", adresse: "", cp: "", ville: "", gps: "", statut: "En cours", date_debut: "", date_fin: "", puissance_kwc: "", description: "", responsable: "", lien_photos: "", dossier_sharepoint: "" },
        intervenantForm: { id: null, type: "", nom_complet: "", societe: "", fonction: "", email: "", telephone: "", adresse_societe: "", notes: "", membre_phenix_solar: false },
        lierForm: { intervenant_id: "", role: "", remarques_r: false, diffusion_d: true },
        confirmData: { title: "", message: "", action: null, confirmLabel: "" },

        // Form visite (VC ou VT — champs étendus pour les deux types)
        // Champs VT : type_visite='VT', entreprise_id, constats_intro, constats_detail, actions_intro, actions_detail
        visiteForm: { id: null, type_visite: "VC", entreprise_id: null, numero_vc: "", date_visite: "", heure_debut: "", heure_fin: "", meteo: "", presents: "", presents_ids: [], destinataires_ids: [], responsable_id: null, base_vie_intro: "", base_vie_detail: "", base_vie_stockage: "", base_vie_stationnement: "", base_vie_dechets: "", planning_intro: "", planning_remarques: "", securite_intro: "", securite_par_entreprise: "", constats_intro: "", constats_detail: "", actions_intro: "", actions_detail: "", redacteur: "", destinataires: "", statut: "Brouillon", interne: false },
        visiteTab: "general",
        // Filtre d'affichage des visites sur la page chantier ('all' | 'VC' | 'VT')
        filterVisiteType: "all",
        // Modale de choix du type de visite (VC ou VT) avant ouverture du formulaire
        choixTypeVisite: false,
        autoSaveStatus: null, // null | 'saving' | 'saved' | 'error'
        autoSaveTimer: null,

        // Form réserve
        reserveForm: { id: null, numero: "", description_courte: "", description_complete: "", action_attendue: "", responsable: "", responsable_id: null, responsable_societe: "", responsable_type: "", echeance: "", priorite: "Normale", categorie: "", _nb_rappels: 0 },
        leverForm: { id: null, numero: "", description_courte: "", date_levee: "", commentaire_levee: "" },

        // Photos
        photosVisite: [],
        photosChantier: [],
        photosReserve: [],
        // Photos d'une réserve en attente d'upload : utilisé quand on ajoute des photos
        // AVANT que la réserve ne soit créée (pas de reserve_id encore disponible).
        // Chaque entrée : { id: tempId, fileBlob, previewUrl, legende, localisation, date_prise_vue }
        // À la création de la réserve dans saveReserve(), ce buffer est dépilé et chaque photo
        // est uploadée avec le reserve_id qu'on vient de récupérer. Si l'utilisateur annule, on
        // révoque les blob URLs et on vide le buffer (rien n'a été uploadé).
        pendingReservePhotos: [],
        // Mode de la modale "Diffusion du rapport" :
        //   'download'       → génère et télécharge le PDF
        //   'email'          → mode mailto: (ouvre le client mail système, glisser-déposer manuel du PDF)
        //   'outlook-graph'  → utilise Microsoft Graph API pour créer un brouillon Outlook avec PJ attachée
        pdfMode: "download",
        photoForm: { 
          attachee_a: "visite", 
          legende: "", 
          localisation: "", 
          date_prise_vue: "",
          fileBlob: null, 
          preview: null, 
          originalSize: 0, 
          compressedSize: 0 
        },
        photoUploadProgress: null,
        lightbox: null, // null | { photos: [], index: 0 }

        // ===== INIT =====
        async init() {
          const { data: { session } } = await supabaseClient.auth.getSession();
          if (session?.user) {
            this.user = session.user;
            await this.loadDashboard();
            await this.loadMembresPhenix();
            // Charger les chantiers pour la sidebar (visible en permanence sur iPad/Desktop)
            await this.loadChantiers();
          }
          this.loading = false;

          // Listener changement auth
          supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === "SIGNED_OUT") {
              this.user = null;
              this.view = "dashboard";
            }
          });
        },

        // ===== AUTH =====
        async login() {
          this.loginLoading = true;
          this.loginError = "";

          const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: this.loginForm.email,
            password: this.loginForm.password,
          });

          if (error) {
            this.loginError = error.message === "Invalid login credentials"
              ? "Identifiants incorrects. Vérifiez email et mot de passe."
              : error.message;
            this.loginLoading = false;
            return;
          }

          this.user = data.user;
          this.loginForm = { email: "", password: "" };
          this.view = "dashboard";
          await this.loadDashboard();
          await this.loadMembresPhenix();
          await this.loadChantiers(); // Pour la sidebar permanente (iPad/Desktop)
          this.loginLoading = false;
        },

        async logout() {
          await supabaseClient.auth.signOut();
          this.user = null;
          this.view = "dashboard";
          this.chantiers = [];
          // Sécurité : vide le cache Supabase pour éviter qu'un autre utilisateur
          // voie les données du précédent (REST data + photos en cache)
          if (typeof window.__phenixClearSupabaseCache === "function") {
            window.__phenixClearSupabaseCache();
          }
        },

        // ===== NAVIGATION =====
        async goDashboard() {
          this.view = "dashboard";
          this.selectedChantier = null;
          this.selectedVisite = null;
          this.searchQuery = "";
          this.searchResults = [];
          await this.loadDashboard();
        },

        async goHome() {
          this.view = "chantiers";
          this.selectedChantier = null;
          this.selectedVisite = null;
          await this.loadChantiers();
        },

        async openChantier(chantier) {
          this.selectedChantier = chantier;
          this.view = "chantier";
          await this.loadChantierDetails();
        },

        // ===== ARCHIVAGE DES VISITES =====
        // Archiver une visite : la sortir de la liste principale (toujours en BDD).
        // Ses réserves restent en BDD mais ne remontent plus puisque la visite mère ne se charge plus.
        async archiverVisite(visite) {
          if (!visite || !visite.id) return;
          const labelType = visite.type_visite === "VT" ? "visite technique" : visite.type_visite === "VI" ? "note interne" : "visite";
          if (!confirm(`Archiver la ${labelType} ${visite.numero_vc} ?\n\nElle sera retirée de la liste principale et déplacée dans les Archives. Vous pourrez la consulter ou la supprimer définitivement depuis là.`)) {
            return;
          }
          const { error } = await supabaseClient
            .from("visites")
            .update({ archivee: true })
            .eq("id", visite.id);
          if (error) {
            this.showToast("Erreur archivage : " + error.message, "error");
            return;
          }
          this.showToast(`${labelType.charAt(0).toUpperCase()}${labelType.slice(1)} ${visite.numero_vc} archivée ✓`, "success");
          // Recharger la liste si on est sur la page chantier
          if (this.selectedChantier) {
            await this.loadChantierDetails();
          }
          // Si on était dans la vue détail de cette visite, retour au chantier
          if (this.selectedVisite?.id === visite.id) {
            this.selectedVisite = null;
            this.view = "chantier";
          }
        },

        // Restaurer une visite archivée : la remettre dans la liste principale.
        async restaurerVisite(visite) {
          if (!visite || !visite.id) return;
          const { error } = await supabaseClient
            .from("visites")
            .update({ archivee: false })
            .eq("id", visite.id);
          if (error) {
            this.showToast("Erreur restauration : " + error.message, "error");
            return;
          }
          this.showToast(`${visite.numero_vc} restaurée ✓`, "success");
          await this.loadVisitesArchivees();
          if (this.selectedChantier) {
            await this.loadChantierDetails();
          }
        },

        // ===== VUE ARCHIVES =====
        async goArchives() {
          if (!this.selectedChantier) return;
          this.view = "archives";
          await this.loadVisitesArchivees();
        },

        async loadVisitesArchivees() {
          if (!this.selectedChantier) return;
          // On charge TOUTES les visites du chantier puis on filtre côté JS sur archivee === true.
          // Avantage : reste robuste même si la colonne archivee n'existe pas encore en BDD
          // (dans ce cas la liste sera vide, ce qui est le comportement attendu).
          const { data, error } = await supabaseClient
            .from("visites")
            .select("*, entreprise:intervenants!entreprise_id(id, nom_complet, societe)")
            .eq("chantier_id", this.selectedChantier.id)
            .order("date_visite", { ascending: false });
          if (error) {
            console.warn("Erreur chargement archives:", error);
            this.visitesArchivees = [];
            return;
          }
          this.visitesArchivees = (data || []).filter(v => v.archivee === true);
        },

        // ===== SUPPRESSION DÉFINITIVE =====
        // Étape 1 : ouvrir la modale qui propose de télécharger le PDF + ZIP photos avant suppression.
        async ouvrirSuppressionVisite(visite) {
          if (!visite || !visite.id) return;
          this.suppressionVisite = visite;
          this.suppressionStep = "init";
          // Compter les photos liées (visite + ses réserves) pour info utilisateur
          let photosCount = 0;
          try {
            // Photos directes de la visite
            const { count: c1 } = await supabaseClient
              .from("photos")
              .select("id", { count: "exact", head: true })
              .eq("visite_id", visite.id);
            photosCount += c1 || 0;
            // Photos des réserves de cette visite
            const { data: reserves } = await supabaseClient
              .from("reserves")
              .select("id")
              .eq("visite_id", visite.id);
            const rIds = (reserves || []).map(r => r.id);
            if (rIds.length > 0) {
              const { count: c2 } = await supabaseClient
                .from("photos")
                .select("id", { count: "exact", head: true })
                .in("reserve_id", rIds);
              photosCount += c2 || 0;
            }
          } catch (e) { console.warn(e); }
          this.suppressionPhotosCount = photosCount;
        },

        fermerSuppressionVisite() {
          this.suppressionVisite = null;
          this.suppressionStep = "init";
          this.suppressionPhotosCount = 0;
        },

        // Étape 2a : générer et télécharger le PDF du rapport de la visite à supprimer.
        async telechargerPdfAvantSuppression() {
          if (!this.suppressionVisite) return;
          this.suppressionStep = "downloading-pdf";
          try {
            // On charge la visite comme si on l'ouvrait, génère le PDF, puis on revient.
            const sauveSelectedVisite = this.selectedVisite;
            this.selectedVisite = this.suppressionVisite;
            // Charger les réserves et photos pour le PDF
            await this.loadReservesVisite();
            await this.loadPhotosVisite();
            // Construire les destinataires par défaut : on prend ceux de la visite (déjà sauvegardés)
            this._pdfFinalDestinataires = (this.suppressionVisite.destinataires_ids || [])
              .map(d => ({ email: d.email, nom: d.nom })).filter(d => d.email);
            await this.generatePDF();
            this.selectedVisite = sauveSelectedVisite;
            this.showToast("PDF téléchargé ✓", "success");
          } catch (e) {
            console.error(e);
            this.showToast("Erreur génération PDF : " + e.message, "error");
          }
          this.suppressionStep = "init";
        },

        // Étape 2b : zipper et télécharger toutes les photos liées à la visite.
        async telechargerZipPhotos() {
          if (!this.suppressionVisite) return;
          if (typeof JSZip === "undefined") {
            this.showToast("Bibliothèque JSZip non chargée", "error");
            return;
          }
          this.suppressionStep = "downloading-photos";
          try {
            // Photos directes de la visite
            const { data: photosVisite } = await supabaseClient
              .from("photos")
              .select("*")
              .eq("visite_id", this.suppressionVisite.id);
            // Photos des réserves de la visite (avec leur numéro de réserve pour le nom de fichier)
            const { data: reserves } = await supabaseClient
              .from("reserves")
              .select("id, numero")
              .eq("visite_id", this.suppressionVisite.id);
            const reserveNumByid = {};
            (reserves || []).forEach(r => { reserveNumByid[r.id] = r.numero; });
            const rIds = (reserves || []).map(r => r.id);
            let photosReserves = [];
            if (rIds.length > 0) {
              const { data: pr } = await supabaseClient
                .from("photos")
                .select("*")
                .in("reserve_id", rIds);
              photosReserves = pr || [];
            }
            const toutesPhotos = [...(photosVisite || []), ...photosReserves];
            if (toutesPhotos.length === 0) {
              this.showToast("Aucune photo à télécharger", "info");
              this.suppressionStep = "init";
              return;
            }
            const zip = new JSZip();
            let okCount = 0;
            for (let i = 0; i < toutesPhotos.length; i++) {
              const p = toutesPhotos[i];
              try {
                const resp = await fetch(p.url_storage);
                if (!resp.ok) continue;
                const blob = await resp.blob();
                // Nom de fichier : prefix selon contexte (visite ou réserve)
                const ext = (p.url_storage.split('.').pop() || "jpg").split("?")[0].toLowerCase();
                const safeExt = ext.length <= 5 ? ext : "jpg";
                let nom;
                if (p.reserve_id && reserveNumByid[p.reserve_id]) {
                  nom = `${reserveNumByid[p.reserve_id]}_${String(i + 1).padStart(3, "0")}.${safeExt}`;
                } else {
                  nom = `photo_visite_${String(i + 1).padStart(3, "0")}.${safeExt}`;
                }
                zip.file(nom, blob);
                okCount++;
              } catch (e) {
                console.warn("Erreur téléchargement photo", p.id, e);
              }
            }
            if (okCount === 0) {
              this.showToast("Aucune photo n'a pu être téléchargée", "error");
              this.suppressionStep = "init";
              return;
            }
            const zipBlob = await zip.generateAsync({ type: "blob" });
            // Déclencher le téléchargement
            const url = URL.createObjectURL(zipBlob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `Photos_${this.selectedChantier.code}_${this.suppressionVisite.numero_vc}.zip`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            this.showToast(`${okCount} photo(s) téléchargée(s) ✓`, "success");
          } catch (e) {
            console.error(e);
            this.showToast("Erreur ZIP photos : " + e.message, "error");
          }
          this.suppressionStep = "init";
        },

        // Étape 3 : suppression définitive en cascade
        // (réserves de la visite → photos de la visite et des réserves → visite)
        // Les fichiers du storage Supabase sont aussi supprimés pour ne pas garder d'orphelins.
        async confirmerSuppressionVisite() {
          if (!this.suppressionVisite) return;
          if (!confirm(`SUPPRESSION DÉFINITIVE de la visite ${this.suppressionVisite.numero_vc} ?\n\nCette action est IRRÉVERSIBLE :\n- la visite, ses réserves, ses photos et ses fichiers seront supprimés\n- aucun retour arrière possible\n\nÊtes-vous sûr ?`)) {
            return;
          }
          this.suppressionStep = "deleting";
          const visiteId = this.suppressionVisite.id;
          try {
            // 1. Récupérer les réserves de la visite (pour leurs photos)
            const { data: reserves } = await supabaseClient
              .from("reserves")
              .select("id")
              .eq("visite_id", visiteId);
            const rIds = (reserves || []).map(r => r.id);

            // 2. Récupérer toutes les photos à supprimer (directes + réserves) pour leurs path_storage
            let photosASupp = [];
            const { data: phVisite } = await supabaseClient
              .from("photos")
              .select("id, path_storage")
              .eq("visite_id", visiteId);
            photosASupp = photosASupp.concat(phVisite || []);
            if (rIds.length > 0) {
              const { data: phReserves } = await supabaseClient
                .from("photos")
                .select("id, path_storage")
                .in("reserve_id", rIds);
              photosASupp = photosASupp.concat(phReserves || []);
            }

            // 3. Supprimer les fichiers du storage Supabase (best effort)
            const paths = photosASupp.map(p => p.path_storage).filter(Boolean);
            if (paths.length > 0) {
              try {
                await supabaseClient.storage.from("photos").remove(paths);
              } catch (e) { console.warn("Erreur suppression fichiers storage:", e); }
            }

            // 4. Supprimer les enregistrements photos en BDD
            if (photosASupp.length > 0) {
              const photoIds = photosASupp.map(p => p.id);
              await supabaseClient.from("photos").delete().in("id", photoIds);
            }

            // 5. Supprimer les réserves de la visite
            if (rIds.length > 0) {
              await supabaseClient.from("reserves").delete().in("id", rIds);
            }

            // 6. Supprimer la visite elle-même
            const { error: errVisite } = await supabaseClient
              .from("visites")
              .delete()
              .eq("id", visiteId);
            if (errVisite) throw errVisite;

            this.showToast(`Visite ${this.suppressionVisite.numero_vc} supprimée définitivement ✓`, "success");
            this.fermerSuppressionVisite();
            await this.loadVisitesArchivees();
          } catch (e) {
            console.error(e);
            this.showToast("Erreur suppression : " + (e.message || e), "error");
            this.suppressionStep = "init";
          }
        },

        async openVisite(visite) {
          this.selectedVisite = visite;
          this.view = "visite";
          await this.loadReservesVisite();
          await this.loadPhotosVisite();
        },

        // Liste fusionnée VC + VT (triée par date desc) avec filtre 'all'/'VC'/'VT'
        // Calculée à la volée pour rester réactive aux changements de this.visites / this.visitesVT / this.filterVisiteType
        get visitesAffichees() {
          const filtre = this.filterVisiteType || "all";
          let liste = [];
          if (filtre === "VC") {
            liste = [...(this.visites || [])];
          } else if (filtre === "VT") {
            liste = [...(this.visitesVT || [])];
          } else {
            liste = [...(this.visites || []), ...(this.visitesVT || [])];
          }
          // Tri date décroissante (puis numero pour départager)
          liste.sort((a, b) => {
            const da = a.date_visite || "";
            const db = b.date_visite || "";
            if (da !== db) return db.localeCompare(da);
            return (b.numero_vc || "").localeCompare(a.numero_vc || "");
          });
          return liste;
        },

        // Helper pour ouvrir une visite (VC ou VT) depuis la liste fusionnée
        async openVisiteSmart(visite) {
          // Pour les VT : on charge les détails complets (avec entreprise) avant d'ouvrir
          if (visite.type_visite === "VT" && !visite.entreprise) {
            const { data } = await supabaseClient
              .from("visites")
              .select("*, entreprise:intervenants!entreprise_id(id, nom_complet, societe, type)")
              .eq("id", visite.id)
              .single();
            if (data) visite = data;
          }
          await this.openVisite(visite);
        },

        // ===== DATA LOADING =====
        async loadChantiers() {
          // On charge aussi les compteurs visites et réserves ouvertes via Supabase aggregate
          // visites: tous les types (VC + VT + VI), réserves: uniquement les ouvertes
          const { data, error } = await supabaseClient
            .from("chantiers")
            .select("*, visites(count), reserves(count)")
            .eq("archive", this.filterArchive)
            .order("created_at", { ascending: false });

          if (error) {
            this.showToast("Erreur de chargement: " + error.message, "error");
            return;
          }
          // Normaliser les compteurs : Supabase retourne [{count: N}] → on extrait juste N
          this.chantiers = (data || []).map(c => ({
            ...c,
            visites_count: (c.visites?.[0]?.count) || 0,
            reserves_count: (c.reserves?.[0]?.count) || 0,
          }));
        },

        async loadChantierDetails() {
          if (!this.selectedChantier) return;

          // Filtre des visites archivées : appliqué côté JS après chargement.
          // Pourquoi ? Si la migration SQL ALTER TABLE ADD COLUMN archivee n'a pas encore été exécutée,
          // un filtre DB (.or("archivee.is.null,archivee.eq.false")) provoque une erreur PostgREST silencieuse
          // qui retourne 0 ligne et donne l'illusion que la liste des visites est vide.
          // En filtrant côté JS, "archivee === undefined" (colonne absente) → tout passe ;
          // "archivee === true" → exclu ; "archivee === false" ou null → conservé.
          const nonArchivee = (v) => v.archivee !== true;

          // Visites officielles (VC)
          const { data: visites } = await supabaseClient
            .from("visites")
            .select("*")
            .eq("chantier_id", this.selectedChantier.id)
            .eq("type_visite", "VC")
            .order("date_visite", { ascending: false });
          this.visites = (visites || []).filter(nonArchivee);

          // Visites techniques (VT)
          const { data: visitesVT } = await supabaseClient
            .from("visites")
            .select("*, entreprise:intervenants!entreprise_id(id, nom_complet, societe, type)")
            .eq("chantier_id", this.selectedChantier.id)
            .eq("type_visite", "VT")
            .order("date_visite", { ascending: false });
          this.visitesVT = (visitesVT || []).filter(nonArchivee);

          // Notes internes (VI)
          const { data: visitesInternes } = await supabaseClient
            .from("visites")
            .select("*")
            .eq("chantier_id", this.selectedChantier.id)
            .eq("type_visite", "VI")
            .order("date_visite", { ascending: false });
          this.visitesInternes = (visitesInternes || []).filter(nonArchivee);

          // Liens intervenants - tri MO → MOE → Hébergeur → SPS → BCT → Entreprise
          const { data: liens } = await supabaseClient
            .from("liens_chantier_intervenant")
            .select("*, intervenants(*)")
            .eq("chantier_id", this.selectedChantier.id)
            .order("ordre_affichage");
          
          const orderType = { 'MO': 1, 'MOE': 2, 'Hébergeur': 3, 'SPS': 4, 'BCT': 5, 'Entreprise': 6 };
          const liensTries = (liens || []).slice().sort((a, b) => {
            const ta = a.intervenants?.type || "";
            const tb = b.intervenants?.type || "";
            const oa = orderType[ta] || 99;
            const ob = orderType[tb] || 99;
            if (oa !== ob) return oa - ob;
            // À type égal : ordre_affichage puis nom
            if ((a.ordre_affichage ?? 0) !== (b.ordre_affichage ?? 0)) {
              return (a.ordre_affichage ?? 0) - (b.ordre_affichage ?? 0);
            }
            return (a.intervenants?.nom_complet || "").localeCompare(b.intervenants?.nom_complet || "");
          });
          this.liens = liensTries;

          // Réserves ouvertes (uniquement type VC) — affichées dans l'encart "Réserves ouvertes"
          const { data: reserves } = await supabaseClient
            .from("reserves")
            .select("*")
            .eq("chantier_id", this.selectedChantier.id)
            .eq("statut", "Ouverte")
            .eq("type_reserve", "VC")
            .order("echeance");
          this.reservesOuvertes = reserves || [];

          // Photos générales du chantier (attachee_a = 'chantier')
          await this.loadPhotosChantier();

          // Annuaire chantier (intervenants liés + membres Phenix) pour les sélecteurs
          await this.loadChantierIntervenants();
        },

        async loadReservesVisite() {
          if (!this.selectedVisite) return;

          const typeVisite = this.selectedVisite.type_visite || 'VC';

          // Charger toutes les réserves du chantier de ce type
          let query = supabaseClient
            .from("reserves")
            .select("*, visites(numero_vc, date_visite)")
            .eq("chantier_id", this.selectedVisite.chantier_id)
            .eq("type_reserve", typeVisite);

          // Cloisonnement VT : on ne charge que les réserves de la même entreprise concernée
          // → une réserve créée dans une VT Solution 30 ne remonte pas sur une VT Triangle Horizon.
          // Si la VT n'a pas d'entreprise_id (cas anormal), on ne filtre pas pour ne rien casser.
          if (typeVisite === "VT" && this.selectedVisite.entreprise_id) {
            query = query.eq("entreprise_vt_id", this.selectedVisite.entreprise_id);
          }

          const { data: allReserves, error } = await query.order("numero");

          if (error || !allReserves) {
            this.reservesVisite = [];
            return;
          }

          const currentVisiteId = this.selectedVisite.id;
          const currentDateVisite = this.selectedVisite.date_visite;

          // Règles d'affichage d'une réserve sur la VC/VT courante :
          //  1. Réserve créée DANS cette visite (visite_id = id courant) → toujours affichée
          //  2. Réserve OUVERTE créée AVANT cette visite (date_visite_origine <= date courante)
          //     → reportée automatiquement
          //  3. Réserve LEVÉE dont la levée a eu lieu AVANT ou PENDANT cette visite (date_levee <= date courante)
          //     → affichée en grisé en bas de liste pour mémoire (historique de levée toujours visible)
          const filtered = allReserves.filter(r => {
            // 1. créée dans cette visite
            if (r.visite_id === currentVisiteId) return true;

            // 2. ouverte créée avant
            if (r.statut === "Ouverte" && r.visites?.date_visite) {
              return r.visites.date_visite <= currentDateVisite;
            }

            // 3. levée à date antérieure ou égale (visible en historique sur toutes les CR postérieures)
            if (r.statut === "Levée" && r.date_levee) {
              return r.date_levee <= currentDateVisite;
            }

            return false;
          });

          // Marqueurs visuels :
          //   _reportee = ouverte d'une visite antérieure
          //   _historique = levée d'une visite antérieure (affichée en grisé en bas)
          for (const r of filtered) {
            r._reportee = (r.statut === "Ouverte" && r.visite_id !== currentVisiteId);
            r._historique = (r.statut === "Levée" && r.visite_id !== currentVisiteId);
          }

          this.reservesVisite = filtered;

          // Mettre à jour derniere_vc des réserves reportées ouvertes (en arrière-plan)
          const reservesAReporter = filtered.filter(r =>
            r._reportee && r.derniere_vc !== this.selectedVisite.numero_vc
          );
          if (reservesAReporter.length > 0) {
            for (const r of reservesAReporter) {
              await supabaseClient
                .from("reserves")
                .update({ derniere_vc: this.selectedVisite.numero_vc })
                .eq("id", r.id);
            }
          }
        },

        // ===== INTERVENANTS - LISTE =====
        goIntervenants() {
          this.view = "intervenants";
          this.selectedChantier = null;
          this.selectedVisite = null;
          this.filterType = "";
          this.filterArchive = false;
          this.loadIntervenants();

        async loadIntervenants() {
          let query = supabaseClient
            .from("intervenants")
            .select("*")
            .eq("archive", this.filterArchive);
          
          if (this.filterType) {
            query = query.eq("type", this.filterType);
          }
          
          const { data, error } = await query.order("nom_complet");

          this.filterIntervenants();
        },

        // Filtrage local rapide (recherche + checkbox Phenix)
        filterIntervenants() {
          const q = (this.intervenantSearchQuery || "").toLowerCase().trim();
          this.intervenantsFiltered = this.intervenants.filter(i => {
            // Filtre Phenix uniquement
            if (this.filterPhenixOnly && !i.membre_phenix_solar) return false;
            // Pas de recherche : tout passe
            if (!q) return true;
            // Recherche dans plusieurs champs
            const hay = [
              i.nom_complet, i.societe, i.fonction, i.email, 
              i.telephone, i.adresse_societe, i.notes
            ].filter(Boolean).join(" ").toLowerCase();
            return hay.includes(q);
          });
        },

        async loadIntervenantsActifs() {
          // Pour la modale "Lier un intervenant" : tous les intervenants actifs
          const { data, error } = await supabaseClient
            .from("intervenants")
            .select("*")
            .eq("archive", false)
            .order("nom_complet");
          
          if (!error) this.intervenantsActifs = data || [];
        },

        // Charger tous les membres Phenix Solar (pour les sélecteurs Responsable)
        async loadMembresPhenix() {
          const { data } = await supabaseClient
            .from("intervenants")
            .select("*")
            .eq("archive", false)
            .eq("membre_phenix_solar", true)
            .order("nom_complet");
          this.membresPhenix = data || [];
        },

        // Charger tous les intervenants du chantier en cours (pour les sélecteurs Présents/Responsable réserve)
        async loadChantierIntervenants() {
          if (!this.selectedChantier) {
            this.chantierIntervenants = [];
            return;
          }
          // 1) Liés explicitement au chantier
          const { data: liens } = await supabaseClient
            .from("liens_chantier_intervenant")
            .select("*, intervenants(*)")
            .eq("chantier_id", this.selectedChantier.id);
          
          const lies = (liens || [])
            .map(l => l.intervenants)
            .filter(i => i && !i.archive);

          // 2) + tous les membres Phenix (toujours dispos même non liés)
          const { data: phenix } = await supabaseClient
            .from("intervenants")
            .select("*")
            .eq("archive", false)
            .eq("membre_phenix_solar", true);

          // Fusionner sans doublons (par id)
          const map = new Map();
          for (const i of lies) map.set(i.id, i);
          for (const i of (phenix || [])) {
            if (!map.has(i.id)) map.set(i.id, i);
          }
          
          // Trier dans l'ordre voulu : MO → MOE → Hébergeur → SPS → BCT → Entreprise
          const order = { 'MO': 1, 'MOE': 2, 'Hébergeur': 3, 'SPS': 4, 'BCT': 5, 'Entreprise': 6 };
          const all = Array.from(map.values()).sort((a, b) => {
            const oa = order[a.type] || 99;
            const ob = order[b.type] || 99;
            if (oa !== ob) return oa - ob;
            return (a.nom_complet || "").localeCompare(b.nom_complet || "");
          });
          
          this.chantierIntervenants = all;
        },

        // Trouver l'intervenant courant (utilisateur connecté) parmi les membres Phenix
        getCurrentUserIntervenant() {
          if (!this.user || !this.user.email) return null;
          const email = this.user.email.toLowerCase();
          return this.membresPhenix.find(i => 
            (i.email || "").toLowerCase() === email
          ) || null;
        },

        // Filtre par recherche dans les membres Phenix Solar (pour responsable)
        filteredMembresPhenix(query) {
          const q = (query || "").toLowerCase().trim();
          if (!q) return this.membresPhenix;
          return this.membresPhenix.filter(m => {
            const hay = [m.nom_complet, m.fonction, m.email].filter(Boolean).join(" ").toLowerCase();
            return hay.includes(q);
          });
        },

        // Filtre par recherche dans les intervenants du chantier (pour présents/responsable réserve)
        filteredChantierIntervenants(query) {
          const q = (query || "").toLowerCase().trim();
          if (!q) return this.chantierIntervenants;
          return this.chantierIntervenants.filter(i => {
            const hay = [i.nom_complet, i.societe, i.fonction, i.email].filter(Boolean).join(" ").toLowerCase();
            return hay.includes(q);
          });
        },

        // === Sélection responsable visite ===
        selectResponsableVisite(membre) {
          this.visiteForm.redacteur = membre.nom_complet;
          this.visiteForm.responsable_id = membre.id;
          this.responsableSearchQuery = "";
          this.responsableSearchOpen = false;
          this.onVisiteFormChange();
        },

        // === Présents (multi-select) ===
        addPresent(intervenant) {
          if (!this.visiteForm.presents_ids) this.visiteForm.presents_ids = [];
          if (this.isPresentSelected(intervenant.id)) return;
          this.visiteForm.presents_ids.push({
            id: intervenant.id,
            nom: intervenant.nom_complet,
            societe: intervenant.societe || "",
            fonction: intervenant.fonction || "",
            type: intervenant.type || "",
            email: intervenant.email || "",
          });
          this.presentsSearchQuery = "";
          this.onVisiteFormChange();
        },

        removePresent(id) {
          if (!this.visiteForm.presents_ids) return;
          this.visiteForm.presents_ids = this.visiteForm.presents_ids.filter(p => p.id !== id);
          this.onVisiteFormChange();
        },

        isPresentSelected(id) {
          if (!this.visiteForm.presents_ids) return false;
          return this.visiteForm.presents_ids.some(p => p.id === id);
        },

        // === Responsable réserve ===
        selectResponsableReserve(intervenant) {
          this.reserveForm.responsable = intervenant.nom_complet;
          this.reserveForm.responsable_id = intervenant.id;
          this.reserveForm.responsable_societe = intervenant.societe || "";
          this.reserveForm.responsable_type = intervenant.type || "";
          this.reserveResponsableSearchQuery = "";
          this.reserveResponsableSearchOpen = false;
        },

        // === Destinataires (multi-select) ===
        addDestinataire(intervenant) {
          if (!this.visiteForm.destinataires_ids) this.visiteForm.destinataires_ids = [];
          if (this.isDestinataireSelected(intervenant.id)) return;
          this.visiteForm.destinataires_ids.push({
            id: intervenant.id,
            nom: intervenant.nom_complet,
            societe: intervenant.societe || "",
            fonction: intervenant.fonction || "",
            type: intervenant.type || "",
            email: intervenant.email || "",
          });
          this.destinatairesSearchQuery = "";
          this.onVisiteFormChange();
        },

        removeDestinataire(id) {
          if (!this.visiteForm.destinataires_ids) return;
          this.visiteForm.destinataires_ids = this.visiteForm.destinataires_ids.filter(d => d.id !== id);
          this.onVisiteFormChange();
        },

        isDestinataireSelected(id) {
          if (!this.visiteForm.destinataires_ids) return false;
          return this.visiteForm.destinataires_ids.some(d => d.id === id);
        },

        addAllPresentsAsDestinataires() {
          if (!this.visiteForm.presents_ids || this.visiteForm.presents_ids.length === 0) return;
          if (!this.visiteForm.destinataires_ids) this.visiteForm.destinataires_ids = [];
          let added = 0;
          for (const p of this.visiteForm.presents_ids) {
            if (!this.isDestinataireSelected(p.id)) {
              this.visiteForm.destinataires_ids.push({
                id: p.id, nom: p.nom, societe: p.societe || "",
                fonction: p.fonction || "", type: p.type || "", email: p.email || ""
              });
              added++;
            }
          }
          this.destinatairesSearchOpen = false;
          this.destinatairesSearchQuery = "";
          if (added > 0) {
            this.showToast(`${added} destinataire(s) ajouté(s)`, "success");
            this.onVisiteFormChange();
          } else {
            this.showToast("Tous les présents sont déjà destinataires", "info");
          }
        },

        // === Création d'intervenant depuis sélecteur Présents/Destinataires ===
        openIntervenantFromVisite(origin) {
          this.intervenantOrigin = origin; // 'present' ou 'destinataire'
          // Pré-remplir le nom avec la recherche en cours
          let nomPrefill = "";
          if (origin === 'present') nomPrefill = this.presentsSearchQuery || "";
          if (origin === 'destinataire') nomPrefill = this.destinatairesSearchQuery || "";
          
          this.intervenantForm = {
            id: null, type: "", nom_complet: nomPrefill, societe: "", fonction: "",
            email: "", telephone: "", adresse_societe: "", notes: "",
            membre_phenix_solar: false
          };
          this.formError = "";
          // Empiler la modale par-dessus la modale visite
          this.previousModal = this.modal;
          this.modal = "intervenant";
        },

        // ===== VC PRÉCÉDENTE (pour comparaison vert/gris) =====
        async loadPreviousVisite(currentDate, currentId) {
          if (!this.selectedChantier) {
            this.previousVisite = null;
            return;
          }
          // Chercher la VC précédente (avant la date courante, type VC, non archivée)
          let query = supabaseClient
            .from("visites")
            .select("*")
            .eq("chantier_id", this.selectedChantier.id)
            .eq("type_visite", "VC");
          
          if (currentId) query = query.neq("id", currentId);
          if (currentDate) query = query.lte("date_visite", currentDate);

          const { data } = await query.order("date_visite", { ascending: false }).limit(1);
          
          this.previousVisite = (data && data.length > 0) ? data[0] : null;
        },

        // Détection de modification : vert si différent de la VC précédente
        isFieldModified(fieldName) {
          if (!this.previousVisite) return false; // pas de précédente = pas de comparaison
          const current = (this.visiteForm[fieldName] || "").trim();
          const previous = (this.previousVisite[fieldName] || "").trim();
          return current !== previous;
        },

        // Détection si on a "repris" du contenu de la précédente (pour griser)
        isFieldFromPrevious(fieldName) {
          if (!this.previousVisite) return false;
          const current = (this.visiteForm[fieldName] || "").trim();
          const previous = (this.previousVisite[fieldName] || "").trim();
          return current && current === previous;
        },

        // Classe CSS du champ selon état
        getFieldStateClass(fieldName) {
          if (!this.previousVisite) return "border-gray-300";
          const current = (this.visiteForm[fieldName] || "").trim();
          const previous = (this.previousVisite[fieldName] || "").trim();
          if (!current && !previous) return "border-gray-300";
          if (current === previous) return "border-gray-300 bg-gray-50 text-gray-600"; // gris = repris
          if (current && current !== previous) return "border-green-400 bg-green-50/50"; // vert = modifié
          return "border-gray-300";
        },

        // Reprendre les sections de la VC précédente (Base vie + Planning + Sécurité)
        async reprendreContenuVCPrecedente() {
          if (!this.previousVisite) {
            this.showToast("Aucune VC précédente trouvée", "info");
            return;
          }
          const champs = [
            "base_vie_intro", "base_vie_detail", "base_vie_stockage", 
            "base_vie_stationnement", "base_vie_dechets",
            "planning_intro", "planning_remarques",
            "securite_intro", "securite_par_entreprise"
          ];
          let count = 0;
          for (const c of champs) {
            if (this.previousVisite[c] && !this.visiteForm[c]) {
              this.visiteForm[c] = this.previousVisite[c];
              count++;
            }
          }
          this.showToast(`${count} section(s) reprise(s) de ${this.previousVisite.numero_vc}`, "success");
          this.onVisiteFormChange();
        },

        // ===== SAUVEGARDE CHANTIER =====
        async saveChantier() {
          this.formError = "";
          this.formLoading = true;

          // Préparation des données
          const payload = { ...this.chantierForm };
          delete payload.id;
          // Convertir les chaînes vides en null pour les champs optionnels
          ["adresse","cp","ville","gps","date_debut","date_fin","description","responsable","lien_photos","dossier_sharepoint"].forEach(k => {
            if (payload[k] === "") payload[k] = null;
          });
          // Puissance : convertir en nombre ou null
          payload.puissance_kwc = payload.puissance_kwc === "" || payload.puissance_kwc === null ? null : parseFloat(payload.puissance_kwc);

          let result;
          if (this.chantierForm.id) {
            // Mise à jour
            result = await supabaseClient
              .from("chantiers")
              .update(payload)
              .eq("id", this.chantierForm.id)
              .select()
              .single();
          } else {
            // Création
            result = await supabaseClient
              .from("chantiers")
              .insert(payload)
              .select()
              .single();
          }

          this.formLoading = false;

          if (result.error) {
            this.formError = result.error.message.includes("duplicate") 
              ? "Ce code de chantier existe déjà." 
              : result.error.message;
            return;
          }

          this.showToast(this.chantierForm.id ? "Chantier mis à jour ✓" : "Chantier créé ✓", "success");
          this.closeModal();

          // Recharger les données
          if (this.view === "chantiers") {
            await this.loadChantiers();
          } else if (this.view === "chantier" && this.selectedChantier) {
            this.selectedChantier = result.data;
          }
        },

        // ===== SAUVEGARDE INTERVENANT =====
        async saveIntervenant() {
          this.formError = "";
          this.formLoading = true;

          const payload = { ...this.intervenantForm };
          delete payload.id;
          ["societe","fonction","email","telephone","adresse_societe","notes"].forEach(k => {
            if (payload[k] === "") payload[k] = null;
          });

          let result;
          if (this.intervenantForm.id) {
            result = await supabaseClient
              .from("intervenants")
              .update(payload)
              .eq("id", this.intervenantForm.id)
              .select()
              .single();
          } else {
            result = await supabaseClient
              .from("intervenants")
              .insert(payload)
              .select()
              .single();
          }

          this.formLoading = false;

          if (result.error) {
            this.formError = result.error.message;
            return;
          }

          this.showToast(this.intervenantForm.id ? "Intervenant mis à jour ✓" : "Intervenant créé ✓", "success");

          // Si on créait un intervenant depuis le sélecteur Présents/Destinataires : revenir à la modale visite
          if (this.intervenantOrigin && result.data) {
            const newInter = result.data;
            // Recharger l'annuaire chantier + membres Phenix pour le voir dans le sélecteur
            await this.loadMembresPhenix();
            await this.loadChantierIntervenants();
            
            // Ajouter automatiquement à la sélection
            if (this.intervenantOrigin === "present") {
              this.addPresent(newInter);
            } else if (this.intervenantOrigin === "destinataire") {
              this.addDestinataire(newInter);
            }
            
            // Revenir à la modale visite (qui était empilée)
            this.intervenantOrigin = null;
            this.modal = this.previousModal || "visite";
            this.previousModal = null;
            this.formError = "";
            return;
          }

          this.closeModal();

          if (this.view === "intervenants") {
            await this.loadIntervenants();
          }
        },

        // ===== SAUVEGARDE LIEN INTERVENANT-CHANTIER =====

          this.formLoading = true;

          if (!this.selectedChantier) {
            this.formError = "Aucun chantier sélectionné.";

          // Récupérer info intervenant pour générer libelle

          const ordreDefaut = { "MO": 1, "MOE": 2, "Hébergeur": 3, "BCT": 4, "SPS": 5, "Entreprise": 6 };

        // ===== VISITE - CRÉATION / ÉDITION =====
        // Fonction générique : ouvre le formulaire pour une VC ou une VT
        // Si visite est fourni → mode édition (le type est lu dans visite.type_visite)
        // Si visite est null → mode création, le type est passé en 2e argument ('VC' ou 'VT')
        async openVisiteForm(visite = null, type = "VC") {
          this.formError = "";
          this.visiteTab = "general";
          this.autoSaveStatus = null;
          this.responsableSearchQuery = "";
          this.responsableSearchOpen = false;
          this.presentsSearchQuery = "";
          this.presentsSearchOpen = false;
          this.destinatairesSearchQuery = "";
          this.destinatairesSearchOpen = false;

          // En mode édition, on récupère le type depuis l'enregistrement
          const typeVisite = visite ? (visite.type_visite || "VC") : type;

          // Annuler timer auto-save précédent
          if (this.autoSaveTimer) {
            clearTimeout(this.autoSaveTimer);
            this.autoSaveTimer = null;
          }

          // S'assurer que l'annuaire chantier et membres Phenix sont chargés
          if (this.membresPhenix.length === 0) await this.loadMembresPhenix();
          if (this.chantierIntervenants.length === 0) await this.loadChantierIntervenants();

          // Charger la VC précédente pour la comparaison vert/gris (uniquement utile pour les VC)
          if (typeVisite === "VC") {
            await this.loadPreviousVisite(visite?.date_visite, visite?.id);
          } else {
            this.previousVisite = null;
          }

          if (visite) {
            // Mode édition : copier toutes les valeurs
            this.visiteForm = {
              id: visite.id,
              type_visite: typeVisite,
              entreprise_id: visite.entreprise_id || null,
              numero_vc: visite.numero_vc || "",
              date_visite: visite.date_visite || "",
              heure_debut: visite.heure_debut || "",
              heure_fin: visite.heure_fin || "",
              meteo: visite.meteo || "",
              presents: visite.presents || "",
              presents_ids: visite.presents_ids || [],
              destinataires_ids: visite.destinataires_ids || [],
              responsable_id: visite.responsable_id || null,
              base_vie_intro: visite.base_vie_intro || "",
              base_vie_detail: visite.base_vie_detail || "",
              base_vie_stockage: visite.base_vie_stockage || "",
              base_vie_stationnement: visite.base_vie_stationnement || "",
              base_vie_dechets: visite.base_vie_dechets || "",
              planning_intro: visite.planning_intro || "",
              planning_remarques: visite.planning_remarques || "",
              securite_intro: visite.securite_intro || "",
              securite_par_entreprise: visite.securite_par_entreprise || "",
              constats_intro: visite.constats_intro || "",
              constats_detail: visite.constats_detail || "",
              actions_intro: visite.actions_intro || "",
              actions_detail: visite.actions_detail || "",
              redacteur: visite.redacteur || "",
              destinataires: visite.destinataires || "",
              statut: visite.statut || "Brouillon",
              interne: visite.interne || false,
            };
          } else {
            // Mode création : auto-incrémenter le N° en fonction du type
            const nextNumero = await this.getNextNumeroVisite(typeVisite);
            const today = new Date().toISOString().split('T')[0];

            // Pré-remplir avec l'utilisateur connecté
            const moi = this.getCurrentUserIntervenant();
            const presentsInit = moi ? [{
              id: moi.id, nom: moi.nom_complet, societe: moi.societe || "",
              fonction: moi.fonction || "", type: moi.type || "", email: moi.email || ""
            }] : [];

            this.visiteForm = {
              id: null,
              type_visite: typeVisite,
              entreprise_id: null,
              numero_vc: nextNumero,
              date_visite: today,

              heure_fin: "",

              presents: "",

              base_vie_dechets: "",
              planning_intro: "",
              planning_remarques: "",

              constats_detail: "",

        },

        // Numérotation auto séparée par type :
        // VC → VC01, VC02, VC03...
        // VT → VT-01, VT-02, VT-03...
        async getNextNumeroVisite(typeVisite = "VC") {
          if (!this.selectedChantier) {
            return typeVisite === "VT" ? "VT-01" : "VC01";
          }

          const { data, error } = await supabaseClient
            .from("visites")
            .select("numero_vc")
            .eq("chantier_id", this.selectedChantier.id)
            .eq("type_visite", typeVisite);

          if (error || !data || data.length === 0) {
            return typeVisite === "VT" ? "VT-01" : "VC01";
          }

          // Extraire les nombres selon le type
          let maxNum = 0;
          const regex = typeVisite === "VT" ? /VT-?(\d+)/i : /VC(\d+)/i;
          for (const v of data) {
            const match = (v.numero_vc || "").match(regex);
            if (match) {
              const num = parseInt(match[1]);
              if (num > maxNum) maxNum = num;
            }
          }

          const next = maxNum + 1;
          if (typeVisite === "VT") {
            return "VT-" + String(next).padStart(2, "0");
          }
          return "VC" + (next < 10 ? "0" + next : next);
        },

        // Conservé pour compatibilité (ancien nom — peut être appelé ailleurs)
        async getNextNumeroVC() {
          return this.getNextNumeroVisite("VC");
        },

        // ===== Choix du type de visite (VC / VT) avant ouverture du formulaire =====
        // Appelé depuis le bouton "+ Nouvelle visite" : affiche une mini-modale avec 2 options
        promptNouvelleVisite() {
          this.choixTypeVisite = true;
        },
        async choisirTypeVisite(type) {
          this.choixTypeVisite = false;
          await this.openVisiteForm(null, type);
        },

        closeVisiteForm() {
          // Forcer une dernière sauvegarde si en attente
          if (this.autoSaveTimer) {
            clearTimeout(this.autoSaveTimer);
            this.autoSaveTimer = null;
            // Sauvegarder une dernière fois si édition
            if (this.visiteForm.id) {
              this.saveVisite(false);
            }
          }
          this.closeModal();
          this.autoSaveStatus = null;
          // Recharger les données du chantier
          if (this.selectedChantier) {
            this.loadChantierDetails();
          }
          // Si on était sur le détail visite, recharger
          if (this.selectedVisite && this.view === "visite") {
            this.refreshSelectedVisite();
          }
        },

        async refreshSelectedVisite() {
          if (!this.selectedVisite) return;
          const { data } = await supabaseClient
            .from("visites")
            .select("*, chantiers(*)")
            .eq("id", this.selectedVisite.id)
            .single();
          if (data) {
            this.selectedVisite = data;
            await this.loadReservesVisite();
          }
        },

        // ===== AUTO-SAVE avec debounce =====
        onVisiteFormChange() {
          // Annuler le timer précédent
          if (this.autoSaveTimer) {
            clearTimeout(this.autoSaveTimer);
          }

          // Pas d'auto-save si pas encore créé (mode création)
          if (!this.visiteForm.id) return;

          // Indiquer "en cours" immédiatement
          this.autoSaveStatus = "saving";

          // Programmer la sauvegarde dans 1 seconde
          this.autoSaveTimer = setTimeout(() => {
            this.saveVisite(false); // false = pas de toast à chaque save
          }, 1000);
        },

        // ===== CRÉATION D'UNE VISITE =====
        async createVisite() {
          if (!this.selectedChantier) {
            this.showToast("Aucun chantier sélectionné", "error");
            return;
          }

          if (!this.visiteForm.numero_vc || !this.visiteForm.date_visite) {
            this.showToast("Le n° de visite et la date sont obligatoires", "error");
            this.visiteTab = "general";
            return;
          }

          // Pour les VT : entreprise_id obligatoire (lien vers intervenant)
          if (this.visiteForm.type_visite === "VT" && !this.visiteForm.entreprise_id) {
            this.showToast("L'entreprise concernée est obligatoire pour une VT", "error");
            this.visiteTab = "general";
            return;
          }

          this.formLoading = true;

          const payload = this.buildVisitePayload();
          payload.chantier_id = this.selectedChantier.id;
          payload.reference_visite = `${this.selectedChantier.code} — ${this.visiteForm.numero_vc} — ${this.formatDate(this.visiteForm.date_visite)}`;

          const { data, error } = await supabaseClient
            .from("visites")
            .insert(payload)
            .select()
            .single();

          this.formLoading = false;

          if (error) {
            this.showToast("Erreur création : " + error.message, "error");
            return;
          }

          const labelType = this.visiteForm.type_visite === "VT" ? "Visite technique" : "Visite";
          this.showToast(labelType + " créée ✓", "success");
          // Passer en mode édition de la visite créée
          this.visiteForm.id = data.id;
          this.autoSaveStatus = "saved";
          // Recharger la liste des visites en arrière-plan
          await this.loadChantierDetails();
        },

        // ===== SAUVEGARDE D'UNE VISITE EXISTANTE =====
        async saveVisite(showToastFlag = true) {
          if (!this.visiteForm.id) return;

          this.autoSaveStatus = "saving";
          
          const payload = this.buildVisitePayload();
          // Mettre à jour la référence si numero_vc ou date a changé
          if (this.selectedChantier) {
            payload.reference_visite = `${this.selectedChantier.code} — ${this.visiteForm.numero_vc} — ${this.formatDate(this.visiteForm.date_visite)}`;
          }

          const { error } = await supabaseClient
            .from("visites")
            .update(payload)
            .eq("id", this.visiteForm.id);

          if (error) {
            this.autoSaveStatus = "error";
            if (showToastFlag) this.showToast("Erreur : " + error.message, "error");
            return;
          }

          this.autoSaveStatus = "saved";
          if (showToastFlag) this.showToast("Visite sauvegardée ✓", "success");
          
          // Effacer le statut après 2 secondes
          setTimeout(() => {
            if (this.autoSaveStatus === "saved") this.autoSaveStatus = null;
          }, 2000);
        },

        // ===== HELPER : convertir le formulaire en payload Supabase =====
        buildVisitePayload() {
          const payload = { ...this.visiteForm };
          delete payload.id;
          // Convertir chaînes vides en null pour les champs optionnels
          ["heure_debut","heure_fin","meteo","presents",
           "base_vie_intro","base_vie_detail","base_vie_stockage","base_vie_stationnement","base_vie_dechets",
           "planning_intro","planning_remarques",
           "securite_intro","securite_par_entreprise",
           "constats_intro","constats_detail","actions_intro","actions_detail",
           "redacteur","destinataires"].forEach(k => {
            if (payload[k] === "") payload[k] = null;
          });
          // entreprise_id : null si non renseigné
          if (payload.entreprise_id === "" || payload.entreprise_id === undefined) {
            payload.entreprise_id = null;
          }
          // S'assurer que type_visite est défini
          if (!payload.type_visite) payload.type_visite = "VC";
          return payload;
        },

        // ===== RÉSERVES - CRÉATION / ÉDITION =====
        async openReserveForm(reserve = null) {
          this.formError = "";
          this.photosReserve = []; // reset
          this.clearPendingReservePhotos(); // reset du buffer photo en attente
          this.reserveResponsableSearchQuery = "";
          this.reserveResponsableSearchOpen = false;

          // S'assurer que l'annuaire chantier est chargé
          if (this.chantierIntervenants.length === 0) await this.loadChantierIntervenants();

          if (reserve) {
            // Mode édition
            this.reserveForm = {
              id: reserve.id,
              numero: reserve.numero || "",
              description_courte: reserve.description_courte || "",
              description_complete: reserve.description_complete || "",
              action_attendue: reserve.action_attendue || "",
              responsable: reserve.responsable || "",
              responsable_id: reserve.responsable_id || null,
              responsable_societe: reserve.responsable_societe || "",
              responsable_type: reserve.responsable_type || "",
              echeance: reserve.echeance || "",
              priorite: reserve.priorite || "Normale",
              categorie: reserve.categorie || "",
              _nb_rappels: reserve.nb_rappels || 0,
            };
            // Si on a un responsable_id, retrouver les détails à jour de l'intervenant
            if (reserve.responsable_id && !reserve.responsable_societe) {
              const found = this.chantierIntervenants.find(i => i.id === reserve.responsable_id);
              if (found) {
                this.reserveForm.responsable_societe = found.societe || "";
                this.reserveForm.responsable_type = found.type || "";
              }
            }
            // Charger les photos liées à cette réserve
            await this.loadPhotosReserve(reserve.id);
          } else {
            // Mode création : auto-incrémenter le numéro
            const nextNumero = await this.getNextNumeroReserve();
            this.reserveForm = {
              id: null,
              numero: nextNumero,
              description_courte: "",
              description_complete: "",
              action_attendue: "",
              responsable: "",
              responsable_id: null,
              responsable_societe: "",
              responsable_type: "",
              echeance: "",
              priorite: "Normale",
              categorie: "",
              _nb_rappels: 0,
            };
          }
          this.modal = "reserve";
        },

        async getNextNumeroReserve() {
          // Auto-incrément par chantier ET par type
          // VC : R-001, R-002...
          // VI : R-VI-001, R-VI-002...
          // VT : R-VT-001, R-VT-002...
          if (!this.selectedChantier) return "R-001";

          const typeReserve = this.selectedVisite?.type_visite || "VC";
          let prefix;
          if (typeReserve === "VI") prefix = "R-VI-";
          else if (typeReserve === "VT") prefix = "R-VT-";
          else prefix = "R-";

          const { data, error } = await supabaseClient
            .from("reserves")
            .select("numero")
            .eq("chantier_id", this.selectedChantier.id)
            .eq("type_reserve", typeReserve);

          if (error || !data || data.length === 0) return prefix + "001";

          // Extraire les nombres selon le type
          let regex;
          if (typeReserve === "VI") regex = /R-VI-(\d+)/i;
          else if (typeReserve === "VT") regex = /R-VT-(\d+)/i;
          else regex = /^R-(\d+)$/i;

          let maxNum = 0;
          for (const r of data) {
            const match = (r.numero || "").match(regex);
            if (match) {
              const num = parseInt(match[1]);
              if (num > maxNum) maxNum = num;
            }
          }

          const next = maxNum + 1;
          return prefix + String(next).padStart(3, "0");
        },

        async saveReserve() {
          this.formError = "";
          this.formLoading = true;

          if (!this.selectedChantier || !this.selectedVisite) {
            this.formError = "Visite ou chantier manquant.";
            this.formLoading = false;
            return;
          }

          const payload = { ...this.reserveForm };
          delete payload.id;
          delete payload._nb_rappels; // champ interne, pas envoyé à Supabase
          delete payload.responsable_societe; // affichage uniquement, pas stocké
          delete payload.responsable_type;    // affichage uniquement, pas stocké

          // Forcer la priorité à Haute si rappels présents
          if (this.reserveForm._nb_rappels > 0) {
            payload.priorite = "Haute";
          }

          // Convertir chaînes vides en null
          ["description_complete","action_attendue","responsable","echeance","categorie"].forEach(k => {
            if (payload[k] === "") payload[k] = null;
          });
          if (!payload.responsable_id) payload.responsable_id = null;

          let result;
          if (this.reserveForm.id) {
            // Mise à jour : on met aussi à jour derniere_vc
            payload.derniere_vc = this.selectedVisite.numero_vc;
            result = await supabaseClient
              .from("reserves")
              .update(payload)
              .eq("id", this.reserveForm.id)
              .select()
              .single();
          } else {
            // Création : initialiser tous les champs liés
            payload.visite_id = this.selectedVisite.id;
            payload.chantier_id = this.selectedChantier.id;
            payload.statut = "Ouverte";
            payload.vc_origine = this.selectedVisite.numero_vc;
            payload.derniere_vc = this.selectedVisite.numero_vc;
            // Type VC, VT ou VI selon le contexte
            payload.type_reserve = this.selectedVisite.type_visite || "VC";

            // Réserves VT : cloisonnement par entreprise concernée.
            // entreprise_vt_id = entreprise_id de la visite mère, pour qu'une réserve créée
            // dans une VT Solution 30 ne remonte que sur les VT futures pour Solution 30
            // (et pas sur une VT Triangle Horizon par exemple).
            if (payload.type_reserve === "VT" && this.selectedVisite.entreprise_id) {
              payload.entreprise_vt_id = this.selectedVisite.entreprise_id;
            }

            result = await supabaseClient
              .from("reserves")
              .insert(payload)
              .select()
              .single();
          }

          this.formLoading = false;

          if (result.error) {
            this.formError = result.error.message;
            return;
          }

          // Distinguer création vs mise à jour AVANT de muter reserveForm.id
          const wasCreation = !this.reserveForm.id;

          // Recharger les réserves de la visite pour répercuter le changement
          await this.loadReservesVisite();
          // Recharger aussi les réserves ouvertes du chantier
          if (this.selectedChantier) {
            const { data: reserves } = await supabaseClient
              .from("reserves")
              .select("*")
              .eq("chantier_id", this.selectedChantier.id)
              .eq("statut", "Ouverte")
              .order("echeance");
            this.reservesOuvertes = reserves || [];
          }

          if (wasCreation && result.data) {
            // ==== Création : on bascule en mode édition au lieu de fermer la modale ====
            // Comme ça l'utilisateur peut enchaîner directement sur l'ajout de photos,
            // sans devoir fermer puis ré-ouvrir la réserve.
            this.reserveForm.id = result.data.id;
            // Hydrater quelques champs qui dépendent de la BDD (numero auto, etc.)
            if (result.data.numero) this.reserveForm.numero = result.data.numero;
            if (result.data._nb_rappels !== undefined) this.reserveForm._nb_rappels = result.data._nb_rappels || 0;

            // ==== Dépiler les photos en attente ====
            // Si l'utilisateur a ajouté des photos AVANT de créer la réserve, on les uploade
            // maintenant en les rattachant au reserve_id qu'on vient d'obtenir.
            let toastMessage = "Réserve créée ✓ — vous pouvez ajouter des photos";
            if (this.pendingReservePhotos.length > 0) {
              const total = this.pendingReservePhotos.length;
              this.formLoading = true;
              this.photoUploadProgress = `Upload des photos (0/${total})…`;
              let okCount = 0;
              for (let i = 0; i < this.pendingReservePhotos.length; i++) {
                this.photoUploadProgress = `Upload des photos (${i + 1}/${total})…`;
                const ok = await this._uploadPendingReservePhoto(
                  this.pendingReservePhotos[i],
                  result.data.id
                );
                if (ok) okCount++;
              }
              this.photoUploadProgress = null;
              this.formLoading = false;
              // Nettoyer le buffer dans tous les cas (ce qui a échoué sera dit dans le toast)
              this.clearPendingReservePhotos();
              if (okCount === total) {
                toastMessage = `Réserve créée ✓ — ${total} photo(s) ajoutée(s)`;
              } else {
                toastMessage = `Réserve créée ✓ — ${okCount}/${total} photo(s) uploadée(s) (vérifiez les autres)`;
              }
            }

            // Recharger les photos liées (en BDD) maintenant que la réserve a un id
            await this.loadPhotosReserve(result.data.id);
            this.showToast(toastMessage, "success");
          } else {
            // ==== Mise à jour : comportement habituel ====
            this.showToast("Réserve mise à jour ✓", "success");
            this.closeModal();
          }
        },

        // ===== DASHBOARD =====
        async loadDashboard() {
          // Charger en parallèle (plus rapide)
          await Promise.all([
            this.loadDashStats(),
            this.loadDashEscalades(),
            this.loadDashRetards(),
            this.loadDashEcheances(),
            this.loadDashVisitesRecentes(),
            this.loadDashChantiersActifs(),
            this.loadDashBrouillon(),
          ]);

        async loadDashStats() {
          // Chantiers actifs
          const { count: nbChantiers } = await supabaseClient
            .from("chantiers")
            .select("*", { count: "exact", head: true })
            .eq("archive", false)
            .eq("statut", "En cours");
          
          // Visites du mois en cours
          const today = new Date();
          const debutMois = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
          const finMois = new Date(today.getFullYear(), today.getMonth() + 1, 0).toISOString().split('T')[0];
          const { count: nbVisites } = await supabaseClient
            .from("visites")
            .select("*", { count: "exact", head: true })
            .eq("type_visite", "VC")
            .gte("date_visite", debutMois)
            .lte("date_visite", finMois);

          // Réserves ouvertes (VC uniquement)
          const { count: nbReserves } = await supabaseClient
            .from("reserves")
            .select("*", { count: "exact", head: true })
            .eq("statut", "Ouverte")
            .eq("type_reserve", "VC");

          // Escalades (réserves ouvertes avec 2+ rappels, VC)
          const { count: nbEscalades } = await supabaseClient
            .from("reserves")
            .select("*", { count: "exact", head: true })
            .eq("statut", "Ouverte")
            .eq("type_reserve", "VC")
            .gte("nb_rappels", 2);

          this.dashStats = {
            chantiersActifs: nbChantiers || 0,
            visitesMois: nbVisites || 0,
            reservesOuvertes: nbReserves || 0,
            escalades: nbEscalades || 0,
          };
        },

        async loadDashEscalades() {
          // Réserves avec 1+ rappel (VC uniquement)
          const { data } = await supabaseClient
            .from("reserves")
            .select("*, chantiers(code, nom)")
            .eq("statut", "Ouverte")
            .eq("type_reserve", "VC")
            .gte("nb_rappels", 1)
            .order("nb_rappels", { ascending: false })
            .limit(10);
          
          this.dashEscalades = (data || []).map(r => ({
            ...r,
            chantierCode: r.chantiers?.code || "",
            chantierNom: r.chantiers?.nom || "",
          }));
        },

        async loadDashRetards() {
          // Réserves en retard (échéance dépassée), sans rappel (sinon c'est dans escalades)
          const today = new Date().toISOString().split('T')[0];
          const { data } = await supabaseClient
            .from("reserves")
            .select("*, chantiers(code, nom)")
            .eq("statut", "Ouverte")
            .eq("type_reserve", "VC")
            .eq("nb_rappels", 0)
            .lt("echeance", today)
            .order("echeance", { ascending: true })
            .limit(10);
          
          this.dashRetards = (data || []).map(r => ({
            ...r,
            chantierCode: r.chantiers?.code || "",
            chantierNom: r.chantiers?.nom || "",
          }));
        },

        async loadDashEcheances() {
          // Réserves avec échéance dans les 30 prochains jours
          const today = new Date();
          const todayStr = today.toISOString().split('T')[0];
          const in30days = new Date(today.getTime() + 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];

          const { data } = await supabaseClient

            .select("*, chantiers(code, nom)")

            .lte("echeance", in30days)
            .order("echeance", { ascending: true })
            .limit(15);
          
          this.dashEcheances = (data || []).map(r => ({
            ...r,
            chantierCode: r.chantiers?.code || "",
            chantierNom: r.chantiers?.nom || "",
          }));

        formatRelativeDate(dateStr) {
          if (!dateStr) return "";
          const date = new Date(dateStr);
          const now = new Date();
          const diffMs = now - date;
          const diffMins = Math.floor(diffMs / 60000);
          const diffHours = Math.floor(diffMs / 3600000);
          const diffDays = Math.floor(diffMs / 86400000);

          if (diffMins < 1) return "à l'instant";
          if (diffMins < 60) return "il y a " + diffMins + " min";
          if (diffHours < 24) return "il y a " + diffHours + "h";
          if (diffDays < 7) return "il y a " + diffDays + "j";
          return "le " + this.formatDate(dateStr);
        },

        // ===== NAVIGATION DEPUIS DASHBOARD =====
        async goToReserve(reserve) {
          // Aller à la visite correspondante de la réserve, et ouvrir l'édition de la réserve
          if (!reserve.visite_id) {
            this.showToast("Réserve sans visite associée", "error");
            return;
          }

          // Charger la visite
          const { data: visite } = await supabaseClient
            .from("visites")
            .select("*, chantiers(*)")
            .eq("id", reserve.visite_id)
            .single();

          if (!visite) {
            this.showToast("Visite introuvable", "error");
            return;
          }

          this.selectedChantier = visite.chantiers;
          this.selectedVisite = visite;
          await this.loadChantierDetails();
          this.view = "visite";
          await this.loadReservesVisite();
          await this.loadPhotosVisite();
          // Ouvrir directement le formulaire de la réserve après un petit délai (rendu)
          setTimeout(() => {
